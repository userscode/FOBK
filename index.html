<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Are An Idiot!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            color: black;
            font-family: "Comic Sans MS", cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.1s;
        }

        .inverted {
            background-color: black;
            color: white;
        }

        h1 {
            font-size: 5rem;
            text-align: center;
            user-select: none;
        }

        #start-btn {
            padding: 15px 30px;
            font-size: 1.5rem;
            cursor: pointer;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 5px #990000;
            z-index: 10;
        }

        #start-btn:active {
            box-shadow: 0 2px #660000;
            transform: translateY(4px);
        }

        .face {
            font-size: 10rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="face">☺</div>
    <h1>YOU ARE AN IDIOT!</h1>
    <button id="start-btn">Нажми на меня!</button>

    <script>
        const body = document.body;
        const btn = document.getElementById('start-btn');
        let isFlashing = false;

        // Функция мерцания фона
        function toggleInvert() {
            body.classList.toggle('inverted');
            setTimeout(toggleInvert, 100);
        }

        // Функция движения окна
        function moveWindow(win) {
            if (!win || win.closed) return;

            const screenWidth = window.screen.availWidth;
            const screenHeight = window.screen.availHeight;
            const winWidth = 300;
            const winHeight = 300;

            let x = Math.random() * (screenWidth - winWidth);
            let y = Math.random() * (screenHeight - winHeight);

            win.moveTo(x, y);
            
            setTimeout(() => moveWindow(win), 50);
        }

        btn.addEventListener('click', () => {
            // Запуск мерцания
            if (!isFlashing) {
                toggleInvert();
                isFlashing = true;
                btn.style.display = 'none';
            }

            // Пытаемся открыть "прыгающее" окно
            // Внимание: большинство браузеров заблокируют это, если не разрешить всплывающие окна
            const popup = window.open(
                window.location.href, 
                '_blank', 
                'width=300,height=300,menubar=no,status=no,toolbar=no'
            );

            if (popup) {
                moveWindow(popup);
            } else {
                console.warn("Пожалуйста, разрешите всплывающие окна для работы эффекта движения.");
            }

            // Воспроизведение звука (опционально, если есть файл)
            // const audio = new Audio('idiot.mp3');
            // audio.loop = true;
            // audio.play();
        });

        // Если это уже открытое маленькое окно, заставляем его двигаться само
        if (window.opener) {
            btn.style.display = 'none';
            toggleInvert();
            
            // Защита от закрытия (классическая фишка)
            window.onbeforeunload = function() {
                return "Вы уверены?";
            };
        }
    </script>
</body>
</html>
