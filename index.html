<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Базовые мета-теги (Значения по умолчанию) -->
    <title id="meta-title">gapp - Делитесь изображениями и видео</title>
    <meta name="description" id="meta-desc-tag" content="Безопасный и быстрый хостинг с автоудалением через 7 дней. Поддержка видео.">

    <!-- Open Graph / Facebook / Telegram / Discord -->
    <meta property="og:type" content="website">
    <meta id="og-url" property="og:url" content="https://gapp.app/">
    <meta id="og-title" property="og:title" content="gapp - Secure Hosting">
    <meta id="og-description" property="og:description" content="Загрузи фото или вставь ссылку на видео. Файлы удаляются автоматически через 7 дней.">
    <meta id="og-image" property="og:image" content="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop">

    <!-- Библиотека для генерации QR-кода -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

    <style>
        /* Base Styles */
        :root {
            --bg-color: #121212;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --accent: #e11d48;        /* красный акцент */
            --accent-hover: #be123c;   /* тёмно-красный */
            --danger: #ef4444;
            --success: #22c55e;
            --border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(10px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Navbar */
        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.875rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #f43f5e, #e11d48); /* красный градиент */
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            text-transform: uppercase;
        }

        .nav-right {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .nav-link:hover {
            background: var(--accent-hover);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255,255,255,0.1);
            padding: 0.25rem 0.5rem 0.25rem 1rem;
            border-radius: 2rem;
            border: 1px solid var(--border);
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-name {
            font-size: 0.9rem;
            font-weight: 500;
        }
        .logout-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 0.5rem;
        }
        .logout-btn:hover { color: var(--danger); }

        /* Sections */
        .hidden-view { display: none; }

        /* Upload Form */
        .upload-section {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .section-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }

        .form-grid { display: grid; gap: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 768px) { .form-row { grid-template-columns: 1fr 1fr; } }

        input, select, textarea {
            background: #27272a;
            border: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: white;
            outline: none;
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            box-shadow: 0 0 0 2px var(--accent);
        }

        textarea { height: 6rem; resize: vertical; }

        .upload-controls { display: flex; flex-direction: column; gap: 1rem; }
        @media (min-width: 768px) { .upload-controls { flex-direction: row; align-items: center; } }

        .drop-zone {
            flex: 1;
            background: #3f3f46;
            border: 2px dashed #71717a;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .drop-zone:hover { background: #52525b; }

        .upload-btn {
            background: var(--accent);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 150px;
        }

        .upload-btn:hover:not(:disabled) { background: var(--accent-hover); }
        .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .form-footer {
            text-align: center;
            font-size: 10px;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 1rem;
        }

        /* Feed (3 колонки) */
        .feed {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        @media (min-width: 768px) { .feed { grid-template-columns: repeat(3, 1fr); } }

        .post-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .post-card:hover { transform: translateY(-5px); }

        .card-img-wrapper { position: relative; cursor: pointer; height: 12rem; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .video-thumb {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #2a2a2a;
            color: var(--text-dim);
            font-size: 0.9rem;
            gap: 0.5rem;
        }
        .video-thumb svg {
            width: 48px;
            height: 48px;
            stroke: var(--accent);
        }

        .timer-badge {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 10px;
            font-family: monospace;
            color: #f87171; /* красноватый */
            font-weight: 700;
        }

        .card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
        .card-title { font-weight: 700; font-size: 1.125rem; cursor: pointer; }
        .card-title:hover { color: #f87171; } /* красный */

        .card-desc { color: var(--text-dim); font-size: 0.875rem; margin-bottom: 1rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .card-footer { margin-top: auto; padding-top: 0.75rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .author-name { font-size: 0.75rem; font-weight: 500; color: #f87171; cursor: pointer; } /* красный */
        .author-name:hover { text-decoration: underline; }
        .card-meta { font-size: 10px; opacity: 0.4; text-transform: uppercase; }

        /* Single Post View */
        .back-btn {
            background: none;
            border: none;
            color: #f87171; /* красный */
            cursor: pointer;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }
        .back-btn:hover { color: #fca5a5; }

        .post-detail-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .post-detail-img { width: 100%; max-height: 70vh; object-fit: contain; background: black; cursor: zoom-in; }
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            background: black;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .post-detail-body { padding: 2rem; }

        .detail-header { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem; }
        @media (min-width: 768px) { .detail-header { flex-direction: row; justify-content: space-between; align-items: flex-start; } }

        .detail-timer-box {
            background: rgba(185, 28, 28, 0.4); /* красноватый */
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(225, 29, 72, 0.3);
            text-align: center;
        }

        .detail-desc { color: #d4d4d8; font-size: 1.125rem; margin-bottom: 2rem; white-space: pre-wrap; }

        /* Modal (только для изображений) */
        #modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        #modal.active { display: flex; }
        .modal-content { position: relative; max-width: 90vw; max-height: 80vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #modal-img { transition: transform 0.2s ease-out; cursor: grab; user-select: none; }
        #modal-img:active { cursor: grabbing; }

        .close-modal { position: absolute; top: 1.25rem; right: 1.25rem; color: white; font-size: 2.5rem; background: none; border: none; cursor: pointer; z-index: 110; }

        .zoom-controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 1rem; padding: 10px 20px; border-radius: 99px; background: rgba(255,255,255,0.1); backdrop-filter: var(--glass-blur); border: 1px solid rgba(255,255,255,0.2); }
        .zoom-btn { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: scale 0.1s; font-weight: bold; }
        .zoom-btn:hover { transform: scale(1.2); }

        /* Notifications */
        .toast {
            position: fixed;
            bottom: 1.25rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            z-index: 200;
            font-weight: 700;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        @media (min-width: 768px) { .toast { left: auto; right: 1.25rem; transform: none; } }

        .paste-active { animation: flash 1s infinite; border-style: solid !important; }
        @keyframes flash {
            0% { border-color: rgba(225, 29, 72, 0.5); }
            50% { border-color: rgba(225, 29, 72, 1); }
            100% { border-color: rgba(225, 29, 72, 0.5); }
        }
    </style>
</head>
<body>

    <!-- Modal Viewer (только для изображений) -->
    <div id="modal">
        <button onclick="closeModal()" class="close-modal">&times;</button>
        <div class="modal-content">
            <img id="modal-img" src="" alt="Полный экран">
        </div>
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="adjustZoom(-0.2)" title="Отдалить">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </button>
            <button class="zoom-btn" onclick="resetZoom()" title="Сбросить">1:1</button>
            <button class="zoom-btn" onclick="adjustZoom(0.2)" title="Приблизить">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </button>
        </div>
    </div>

    <!-- Navigation -->
    <nav>
        <h1 onclick="window.location.search = ''" class="logo">gapp</h1>
        <div class="nav-right">
            <!-- Контейнер для пользователя будет заполнен динамически -->
            <div id="user-info-placeholder"></div>
            <a href="https://github.com/userscode/FOBK/tree/main" target="_blank" rel="noopener noreferrer" class="nav-link">GitHub</a>
        </div>
    </nav>

    <main class="container">

        <!-- Single Post View -->
        <section id="single-post-view" class="hidden-view">
            <button onclick="window.location.search = ''" class="back-btn">
                <span>← Назад в ленту</span>
            </button>
            <div id="single-post-content"></div>
        </section>

        <!-- Profile View -->
        <section id="profile-view" class="hidden-view">
            <button onclick="window.location.search = ''" class="back-btn">
                <span>← Назад в ленту</span>
            </button>
            <h2 style="margin-bottom: 1.5rem;" id="profile-title">Профиль</h2>
            <div id="profile-feed" class="feed"></div>
        </section>

        <!-- Main Feed View -->
        <section id="main-feed-view">
            <!-- Upload Form -->
            <section class="upload-section">
                <h2 class="section-title">Создать новый пост</h2>
                <div class="form-grid">
                    <div class="form-row">
                        <input type="text" id="post-author" placeholder="Ваше имя (автор)">
                        <select id="post-privacy">
                            <option value="public">🌍 Доступен всем (в ленте)</option>
                            <option value="private">🔗 Только по ссылке</option>
                        </select>
                    </div>
                    <input type="text" id="post-title" placeholder="Заголовок">
                    <textarea id="post-desc" placeholder="Описание (необязательно)"></textarea>

                    <!-- Поле для ссылки на видео -->
                    <input type="url" id="post-video-url" placeholder="Ссылка на видео (YouTube, Rutube, Vimeo...)">

                    <div class="upload-controls">
                        <label id="drop-zone" class="drop-zone">
                            <span id="file-label">Выбрать фото или Ctrl+V</span>
                            <input type="file" id="post-file" accept="image/*" style="display: none;">
                        </label>
                        <button id="upload-btn" class="upload-btn">Опубликовать</button>
                    </div>
                    <p class="form-footer">Автоудаление через 7 дней. Если указана ссылка на видео, фото игнорируется.</p>
                </div>
            </section>

            <!-- Feed -->
            <div id="loading-status" style="text-align: center; padding: 2.5rem; opacity: 0.5;">Загрузка ленты...</div>
            <div id="feed" class="feed"></div>
        </section>
    </main>

    <script type="module">
        // Спам в консоль
        console.log("gapp с красной темой и поддержкой старых постов");

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // НОВЫЙ КОНФИГ (предоставлен пользователем)
        const firebaseConfig = {
            apiKey: "AIzaSyDb_xlpLYoVEkd1aObJjzvlS8-JPDjn72E",
            authDomain: "generalapp-b4f45.firebaseapp.com",
            projectId: "generalapp-b4f45",
            storageBucket: "generalapp-b4f45.firebasestorage.app",
            messagingSenderId: "800461808673",
            appId: "1:800461808673:web:ec6374f28c7a40ced7ef60",
            measurementId: "G-JYL0G1J1GJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Список возможных appId для поддержки старых постов
        const possibleAppIds = ['gapp-app-v2', 'fobk-app-v2'];
        const currentAppId = 'gapp-app-v2'; // текущий для новых постов

        // Коллекция для новых постов (используется при создании и в ленте)
        const postsCol = collection(db, 'artifacts', currentAppId, 'public', 'data', 'posts');

        let currentUser = null; // будем хранить информацию о пользователе

        // UI элементы
        const userPlaceholder = document.getElementById('user-info-placeholder');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');
        const feedContainer = document.getElementById('feed');
        const profileFeed = document.getElementById('profile-feed');
        const profileTitle = document.getElementById('profile-title');
        const fileInput = document.getElementById('post-file');
        const fileLabel = document.getElementById('file-label');
        const dropZone = document.getElementById('drop-zone');
        const mainFeedView = document.getElementById('main-feed-view');
        const singlePostView = document.getElementById('single-post-view');
        const profileView = document.getElementById('profile-view');
        const singlePostContent = document.getElementById('single-post-content');

        let pastedFile = null;
        let currentZoom = 1;

        // Наблюдаем за состоянием аутентификации
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            renderUserInfo();

            // Если мы на странице профиля, перезагружаем его (чтобы обновилась видимость приватных постов)
            const urlParams = new URLSearchParams(window.location.search);
            const profileId = urlParams.get('profile');
            if (profileId) {
                loadProfile(profileId);
            }
        });

        // Функция отображения информации о пользователе в навбаре
        function renderUserInfo() {
            if (currentUser) {
                const photoURL = currentUser.photoURL || 'https://via.placeholder.com/32';
                const displayName = currentUser.displayName || 'Пользователь';
                userPlaceholder.innerHTML = `
                    <div class="user-info">
                        <img src="${photoURL}" class="user-avatar" alt="avatar">
                        <span class="user-name">${displayName}</span>
                        <button class="logout-btn" title="Выйти" onclick="handleLogout()">✕</button>
                    </div>
                    <button class="nav-link" onclick="window.location.search='?profile=${currentUser.uid}'">Профиль</button>
                `;
            } else {
                userPlaceholder.innerHTML = `<button class="nav-link" onclick="handleGoogleSignIn()">Войти с Google</button>`;
            }
        }

        // Обработчики входа/выхода (делаем глобальными, чтобы вызывать из onclick)
        window.handleGoogleSignIn = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Ошибка входа:", error);
                showToast("Ошибка входа");
            }
        };

        window.handleLogout = async () => {
            try {
                await signOut(auth);
                window.location.search = ''; // возвращаем на главную
            } catch (error) {
                console.error("Ошибка выхода:", error);
            }
        };

        // Modal Functions
        window.openModal = (imgSrc) => {
            modalImg.src = imgSrc;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            resetZoom();
        };

        window.closeModal = () => {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        window.adjustZoom = (delta) => {
            currentZoom = Math.max(0.2, Math.min(5, currentZoom + delta));
            modalImg.style.transform = `scale(${currentZoom})`;
        };

        window.resetZoom = () => {
            currentZoom = 1;
            modalImg.style.transform = `scale(1)`;
        };

        modal.onclick = (e) => {
            if (e.target === modal || e.target.classList.contains('modal-content')) closeModal();
        };

        // Timer Logic
        function updateTimers() {
            document.querySelectorAll('[data-expiry]').forEach(el => {
                const expiry = parseInt(el.dataset.expiry);
                const now = Date.now();
                const diff = expiry - now;

                if (diff <= 0) {
                    el.innerText = "Удалено";
                    return;
                }

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diff % (1000 * 60)) / 1000);

                el.innerText = `${days}д ${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            });
        }
        setInterval(updateTimers, 1000);

        // Router
        const urlParams = new URLSearchParams(window.location.search);
        const postIdFromUrl = urlParams.get('post');
        const profileIdFromUrl = urlParams.get('profile');

        if (postIdFromUrl) {
            loadSinglePost(postIdFromUrl);
        } else if (profileIdFromUrl) {
            // Всегда загружаем профиль, независимо от авторизации
            loadProfile(profileIdFromUrl);
        } else {
            mainFeedView.classList.remove('hidden-view');
            profileView.classList.add('hidden-view');
            singlePostView.classList.add('hidden-view');
            loadFeed();
        }

        // Функция преобразования ссылки на видео в embed URL
        function convertToEmbedUrl(url) {
            try {
                const urlObj = new URL(url);
                // YouTube
                if (urlObj.hostname.includes('youtube.com') || urlObj.hostname.includes('youtu.be')) {
                    let videoId = '';
                    if (urlObj.hostname.includes('youtu.be')) {
                        videoId = urlObj.pathname.slice(1);
                    } else if (urlObj.pathname === '/watch') {
                        videoId = urlObj.searchParams.get('v');
                    } else if (urlObj.pathname.startsWith('/embed/')) {
                        return url; // уже embed
                    }
                    if (videoId) return `https://www.youtube.com/embed/${videoId}`;
                }
                // Rutube
                if (urlObj.hostname.includes('rutube.ru')) {
                    const match = urlObj.pathname.match(/\/video\/([a-f0-9]+)/);
                    if (match) return `https://rutube.ru/play/embed/${match[1]}`;
                }
                // Vimeo
                if (urlObj.hostname.includes('vimeo.com')) {
                    const videoId = urlObj.pathname.split('/').pop();
                    if (videoId) return `https://player.vimeo.com/video/${videoId}`;
                }
                // Если ничего не подошло, вернем исходную ссылку
                return url;
            } catch (e) {
                return url; // невалидный URL
            }
        }

        // Загрузка поста с поддержкой старых коллекций
        async function loadSinglePost(id) {
            mainFeedView.classList.add('hidden-view');
            profileView.classList.add('hidden-view');
            singlePostView.classList.remove('hidden-view');
            singlePostContent.innerHTML = '<p style="text-align: center; padding: 5rem; opacity: 0.5;">Загрузка...</p>';

            let found = false;
            let post = null;
            let usedAppId = null;

            // Перебираем возможные appId
            for (const appId of possibleAppIds) {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', id);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        post = docSnap.data();
                        usedAppId = appId;
                        found = true;
                        console.log(`Пост найден в коллекции: ${appId}`);
                        break;
                    }
                } catch (e) {
                    console.warn(`Ошибка при поиске в ${appId}:`, e);
                }
            }

            if (!found) {
                singlePostContent.innerHTML = '<p style="text-align: center; padding: 5rem;">Пост не найден.</p>';
                return;
            }

            // Обновляем мета-теги
            updateMeta(post, id, usedAppId);

            const now = Date.now();
            if (post.expiresAt < now) {
                singlePostContent.innerHTML = '<p style="text-align: center; padding: 5rem; color: var(--danger);">Срок действия истек.</p>';
                return;
            }

            // Генерируем HTML в зависимости от типа
            let mediaHtml = '';
            if (post.type === 'video' && post.videoUrl) {
                const embedUrl = convertToEmbedUrl(post.videoUrl);
                mediaHtml = `
                    <div class="video-container">
                        <iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe>
                    </div>
                `;
            } else {
                mediaHtml = `<img src="${post.imageJson}" class="post-detail-img" onclick="openModal('${post.imageJson}')">`;
            }

            singlePostContent.innerHTML = `
                <div class="post-detail-card">
                    <div style="position: relative;">
                        ${mediaHtml}
                        <div style="position: absolute; bottom: 1rem; right: 1rem; display: flex; gap: 0.5rem; align-items: center;">
                            <canvas id="qrcode-${id}" width="80" height="80" style="border-radius: 8px; background: white; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);"></canvas>
                            <button onclick="copyLink(event, '${id}')" style="background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.2); color: white; cursor: pointer; font-size: 12px; font-weight: bold;">Поделиться</button>
                        </div>
                    </div>
                    <div class="post-detail-body">
                        <div class="detail-header">
                            <h2 style="font-size: 1.875rem; font-weight: 700;">${escapeHtml(post.title)}</h2>
                            <div class="detail-timer-box">
                                <span style="font-size: 10px; text-transform: uppercase; opacity: 0.6; display: block;">До удаления</span>
                                <span style="font-family: monospace; color: #f87171; font-weight: 700;" data-expiry="${post.expiresAt}">--:--:--</span>
                            </div>
                        </div>
                        <p class="detail-desc">${escapeHtml(post.description || '')}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 2rem; padding-top: 1.5rem;">
                            <div>
                                <span style="font-size: 0.875rem; opacity: 0.5; display: block; text-transform: uppercase;">Автор</span>
                                <span style="color: #f87171; font-weight: 700; font-size: 1.25rem; cursor: pointer;" onclick="window.location.search='?profile=${post.authorUid || ''}'">@${escapeHtml(post.authorName || 'Аноним')}</span>
                            </div>
                            <div style="text-align: right;">
                                <span style="font-size: 10px; opacity: 0.4; display: block; text-transform: uppercase;">Доступ</span>
                                <span style="font-size: 12px;">${post.privacy === 'private' ? '🔒 По ссылке' : '🌍 Публичный'}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Генерация QR-кода
            const canvas = document.getElementById(`qrcode-${id}`);
            if (canvas && typeof QRCode !== 'undefined') {
                QRCode.toCanvas(canvas, window.location.href, { width: 80 }, function(error) {
                    if (error) console.error('Ошибка генерации QR-кода:', error);
                });
            }
        }

        function updateMeta(post, id, appId) {
            const pageTitle = `${post.title} - gapp`;
            const pageDesc = post.description || `Пост от @${post.authorName || 'Аноним'}. Удаление через 7 дней.`;
            const pageUrl = window.location.href;
            const imageUrl = post.type === 'video' ? 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=500' : post.imageJson; // заглушка для видео

            document.title = pageTitle;
            document.getElementById('meta-title').innerText = pageTitle;
            document.getElementById('meta-desc-tag').setAttribute('content', pageDesc);
            document.getElementById('og-title').setAttribute('content', pageTitle);
            document.getElementById('og-description').setAttribute('content', pageDesc);
            document.getElementById('og-url').setAttribute('content', pageUrl);
            document.getElementById('og-image').setAttribute('content', imageUrl);
        }

        function loadFeed() {
            onSnapshot(postsCol, (snapshot) => {
                document.getElementById('loading-status').style.display = 'none';
                feedContainer.innerHTML = '';
                const now = Date.now();
                let posts = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.expiresAt > now && data.privacy === 'public') {
                        posts.push({ id: doc.id, ...data });
                    }
                });
                posts.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                posts.forEach(post => {
                    feedContainer.appendChild(createPostCard(post));
                });

                if (posts.length === 0) {
                    feedContainer.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; opacity: 0.3; padding: 5rem;">Лента пока пуста.</p>';
                }
            });
        }

        // Загрузка профиля (по uid) — используем только текущую коллекцию
        function loadProfile(uid) {
            mainFeedView.classList.add('hidden-view');
            singlePostView.classList.add('hidden-view');
            profileView.classList.remove('hidden-view');
            profileFeed.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; padding: 2.5rem; opacity: 0.5;">Загрузка постов...</p>';

            // Определяем, свой это профиль или чужой
            const isOwnProfile = currentUser && currentUser.uid === uid;
            profileTitle.innerText = isOwnProfile ? 'Мои посты' : 'Посты пользователя';

            // Формируем запрос
            let q;
            if (isOwnProfile) {
                // Свои посты — показываем все (включая приватные)
                q = query(postsCol, where("authorUid", "==", uid));
            } else {
                // Чужие посты — только публичные
                q = query(postsCol, where("authorUid", "==", uid), where("privacy", "==", "public"));
            }

            onSnapshot(q, (snapshot) => {
                profileFeed.innerHTML = '';
                const now = Date.now();
                let posts = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.expiresAt > now) {
                        posts.push({ id: doc.id, ...data });
                    }
                });
                posts.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                posts.forEach(post => {
                    profileFeed.appendChild(createPostCard(post));
                });

                if (posts.length === 0) {
                    profileFeed.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; opacity: 0.3; padding: 5rem;">Здесь пока нет постов.</p>';
                }
            });
        }

        // Создание карточки поста (используется и в ленте, и в профиле)
        function createPostCard(post) {
            const card = document.createElement('div');
            card.className = "post-card";

            let mediaHtml = '';
            if (post.type === 'video') {
                mediaHtml = `
                    <div class="card-img-wrapper" onclick="window.location.search='?post=${post.id}'">
                        <div class="video-thumb">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <span>Видео</span>
                        </div>
                        <div class="timer-badge" data-expiry="${post.expiresAt}">--:--:--</div>
                    </div>
                `;
            } else {
                mediaHtml = `
                    <div class="card-img-wrapper" onclick="openModal('${post.imageJson}')">
                        <img src="${post.imageJson}" alt="${post.title}" class="card-img">
                        <div class="timer-badge" data-expiry="${post.expiresAt}">--:--:--</div>
                    </div>
                `;
            }

            card.innerHTML = `
                ${mediaHtml}
                <div class="card-body">
                    <div class="card-header">
                        <h3 class="card-title" onclick="window.location.search='?post=${post.id}'">${escapeHtml(post.title)}</h3>
                        <button onclick="copyLink(event, '${post.id}')" style="background: none; border: none; cursor: pointer; color: white; opacity: 0.5; padding: 0.25rem;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        </button>
                    </div>
                    <p class="card-desc">${escapeHtml(post.description || '')}</p>
                    <div class="card-footer">
                        <span class="author-name" onclick="window.location.search='?profile=${post.authorUid || ''}'">@${escapeHtml(post.authorName || 'Аноним')}</span>
                        <span class="card-meta">${post.type === 'video' ? '🎬' : '📷'}</span>
                    </div>
                </div>
            `;
            return card;
        }

        // Paste Logic
        window.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    pastedFile = blob;
                    fileLabel.innerText = "Фото из буфера готово!";
                    dropZone.classList.add('paste-active');
                    setTimeout(() => dropZone.classList.remove('paste-active'), 1000);
                    showToast("Фото прикреплено!");
                }
            }
        });

        fileInput.onchange = (e) => {
            if(e.target.files[0]) {
                pastedFile = null;
                fileLabel.innerText = e.target.files[0].name;
            }
        };

        const fileToBase64 = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });

        document.getElementById('upload-btn').onclick = async () => {
            const author = document.getElementById('post-author').value || 'Аноним';
            const title = document.getElementById('post-title').value;
            const desc = document.getElementById('post-desc').value;
            const privacy = document.getElementById('post-privacy').value;
            const videoUrl = document.getElementById('post-video-url').value.trim();
            const file = pastedFile || fileInput.files[0];

            // Валидация
            if (!title) return showToast("Заполни заголовок!");
            if (!videoUrl && !file) return showToast("Добавь фото или ссылку на видео!");

            try {
                const btn = document.getElementById('upload-btn');
                btn.disabled = true; btn.innerText = "Публикация...";

                let postData = {
                    title,
                    description: desc,
                    authorName: author,
                    privacy: privacy,
                    createdAt: serverTimestamp(),
                    expiresAt: Date.now() + (7 * 24 * 60 * 60 * 1000),
                    authorUid: currentUser ? currentUser.uid : null
                };

                if (videoUrl) {
                    // Пост-видео
                    postData.type = 'video';
                    postData.videoUrl = videoUrl;
                } else {
                    // Пост-изображение
                    const base64Data = await fileToBase64(file);
                    postData.type = 'image';
                    postData.imageJson = base64Data;
                }

                const newDoc = await addDoc(postsCol, postData);

                // Очистка формы
                fileInput.value = '';
                pastedFile = null;
                fileLabel.innerText = "Выбрать фото или Ctrl+V";
                document.getElementById('post-title').value = '';
                document.getElementById('post-desc').value = '';
                document.getElementById('post-video-url').value = '';

                if (privacy === 'private') {
                    showToast("Опубликовано приватно!");
                    window.location.search = `?post=${newDoc.id}`;
                } else {
                    showToast("Опубликовано в ленту!");
                }
            } catch (err) {
                console.error(err);
                showToast("Ошибка загрузки");
            }
            finally {
                document.getElementById('upload-btn').disabled = false;
                document.getElementById('upload-btn').innerText = "Опубликовать";
            }
        };

        window.copyLink = (event, id) => {
            event.stopPropagation();
            const url = window.location.origin + window.location.pathname + '?post=' + id;

            const el = document.createElement('textarea');
            el.value = url;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            showToast("Ссылка скопирована!");
        };

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = "toast";
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function escapeHtml(t) {
            if (!t) return '';
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }
    </script>
</body>
</html>
