<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegraph Clone Pro</title>
    
    <!-- OpenGraph -->
    <meta property="og:type" content="article">
    <meta id="og-title" property="og:title" content="Telegraph Clone Pro">
    
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* Base Styles - Custom CSS (No Tailwind) */
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-muted: #666666;
            --border: #eeeeee;
            --card-bg: #fdfdfd;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navigation */
        nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
        }

        .logo span { color: var(--primary); }

        .btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }

        /* User Info */
        .user-block { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); }

        /* Views */
        .view { padding: 40px 0; }
        .hidden { display: none; }

        /* Editor */
        .editor-input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            margin-bottom: 20px;
        }
        .title-input { font-size: 2.5rem; font-weight: 700; }
        .desc-input { font-size: 1.1rem; color: var(--text-muted); }
        .content-area {
            width: 100%;
            min-height: 400px;
            font-family: 'Lora', serif;
            font-size: 1.2rem;
            border: none;
            outline: none;
            resize: none;
        }

        /* Reader */
        .reader h1 { font-size: 3rem; margin-bottom: 10px; }
        .meta { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }
        .markdown-content { font-family: 'Lora', serif; font-size: 1.25rem; }

        /* Settings Card */
        .settings-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 40px;
            border: 1px solid var(--border);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        /* Post Card */
        .post-card {
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            background: var(--card-bg);
            transition: transform 0.2s;
        }
        .post-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        .post-card h3 { margin: 0 0 10px 0; }
        .post-actions { margin-top: 15px; display: flex; gap: 10px; }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 1000;
        }

        /* Floating Publish */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(0,123,255,0.3);
            cursor: pointer;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="container nav-content">
            <a href="#" class="logo" onclick="router.navigate('home')">Telegra.ph<span>Pro</span></a>
            <div id="auth-section">
                <button id="btn-login" class="btn btn-primary">Войти через Google</button>
                <div id="user-info" class="hidden user-block">
                    <img id="user-photo" class="avatar">
                    <button id="btn-logout" class="btn btn-outline">Выйти</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        
        <!-- HOME VIEW -->
        <section id="view-home" class="view">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2>Ваши записи</h2>
                <button onclick="router.navigate('edit')" class="btn btn-primary">Создать пост</button>
            </div>

            <div id="posts-list">
                <p style="color: #999; font-style: italic;">Загрузка...</p>
            </div>

            <!-- Settings / Account -->
            <div id="account-settings" class="settings-card hidden">
                <h4>Настройки аккаунта</h4>
                <div class="toggle-container">
                    <input type="checkbox" id="advanced-mode">
                    <label for="advanced-mode">Расширенный режим (Copy HTML/Embed)</label>
                </div>
            </div>
        </section>

        <!-- EDITOR VIEW -->
        <section id="view-edit" class="view hidden">
            <input id="post-title" class="editor-input title-input" placeholder="Заголовок">
            <input id="post-desc" class="editor-input desc-input" placeholder="Краткое описание для соцсетей...">
            <textarea id="post-content" class="content-area" placeholder="Напишите вашу историю (Markdown поддерживается)..."></textarea>
            <button id="btn-publish" class="fab">+</button>
        </section>

        <!-- READER VIEW -->
        <section id="view-read" class="view hidden">
            <article class="reader">
                <h1 id="read-title"></h1>
                <div class="meta">
                    Автор: <span id="read-author"></span> | <span id="read-date"></span>
                </div>
                <div id="read-content" class="markdown-content"></div>
            </article>

            <div id="advanced-tools" class="settings-card hidden">
                <h5>Инструменты встраивания</h5>
                <p style="font-size: 0.8rem; color: #666;">Используйте этот код для вставки на ваш сайт через наш CDN-загрузчик:</p>
                <code id="embed-code" style="display:block; background:#eee; padding:10px; border-radius:5px; font-size:0.75rem; word-break: break-all;"></code>
                <button onclick="copyEmbed()" class="btn btn-outline" style="margin-top:10px;">Копировать HTML</button>
            </div>
        </section>

    </main>

    <div id="toast">Скопировано в буфер обмена!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDoc, getDocs, doc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDb_xlpLYoVEkd1aObJjzvlS8-JPDjn72E",
            authDomain: "generalapp-b4f45.firebaseapp.com",
            databaseURL: "https://generalapp-b4f45-default-rtdb.firebaseio.com",
            projectId: "generalapp-b4f45",
            storageBucket: "generalapp-b4f45.firebasestorage.app",
            messagingSenderId: "800461808673",
            appId: "1:800461808673:web:ec6374f28c7a40ced7ef60",
            measurementId: "G-JYL0G1J1GJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'telegraph-pro';

        let currentUser = null;
        let isAdvancedMode = localStorage.getItem('adv_mode') === 'true';

        // --- Router ---
        window.router = {
            navigate: (view, id = null) => {
                document.querySelectorAll('.view').forEach(el => el.classList.add('hidden'));
                document.getElementById(`view-${view}`).classList.remove('hidden');
                if (view === 'home') {
                    loadPosts();
                    document.getElementById('account-settings').classList.toggle('hidden', !currentUser);
                    document.getElementById('advanced-mode').checked = isAdvancedMode;
                }
                if (view === 'read' && id) loadPostContent(id);
                window.scrollTo(0,0);
            }
        };

        // --- Auth ---
        document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('btn-logout').onclick = () => signOut(auth);
        
        document.getElementById('advanced-mode').onchange = (e) => {
            isAdvancedMode = e.target.checked;
            localStorage.setItem('adv_mode', isAdvancedMode);
            loadPosts(); // Refresh list to show/hide copy buttons
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            document.getElementById('btn-login').classList.toggle('hidden', !!user);
            document.getElementById('user-info').classList.toggle('hidden', !user);
            if (user) {
                document.getElementById('user-photo').src = user.photoURL;
                router.navigate('home');
            }
        });

        // --- Post Logic ---
        async function loadPosts() {
            const list = document.getElementById('posts-list');
            if (!currentUser) {
                list.innerHTML = '<p>Войдите, чтобы управлять своими публикациями.</p>';
                return;
            }

            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), where('authorId', '==', currentUser.uid));
            const snap = await getDocs(q);
            list.innerHTML = '';
            
            snap.forEach(d => {
                const p = d.data();
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <h3>${p.title}</h3>
                    <p style="color:#666; font-size:0.9rem;">${p.description || ''}</p>
                    <div class="post-actions">
                        <button onclick="router.navigate('read', '${d.id}')" class="btn btn-outline">Открыть</button>
                        ${isAdvancedMode ? `<button onclick="copyPostHtml('${d.id}')" class="btn btn-primary">Copy HTML Code</button>` : ''}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function loadPostContent(id) {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', id);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const p = docSnap.data();
                document.getElementById('read-title').innerText = p.title;
                document.getElementById('read-author').innerText = p.authorName;
                document.getElementById('read-date').innerText = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleDateString() : '';
                document.getElementById('read-content').innerHTML = marked.parse(p.content);
                
                // Embed tools
                const currentUrl = window.location.href.split('?')[0];
                const embedSnippet = `<div id="tg-post-${id}"></div><script src="${currentUrl}?cdn=true&id=${id}"><\/script>`;
                document.getElementById('embed-code').innerText = embedSnippet;
                document.getElementById('advanced-tools').classList.toggle('hidden', !isAdvancedMode);
            }
        }

        document.getElementById('btn-publish').onclick = async () => {
            const title = document.getElementById('post-title').value;
            const desc = document.getElementById('post-desc').value;
            const content = document.getElementById('post-content').value;
            if(!title || !content) return;

            const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), {
                title, description: desc, content,
                authorId: currentUser.uid, authorName: currentUser.displayName,
                createdAt: serverTimestamp()
            });
            router.navigate('read', docRef.id);
        };

        // --- Helper: Copy Tools ---
        window.copyPostHtml = (id) => {
            const currentUrl = window.location.href.split('?')[0];
            const code = `<div id="tg-post-${id}"></div><script src="${currentUrl}?cdn=true&id=${id}"><\/script>`;
            copyToClipboard(code);
        };

        window.copyEmbed = () => {
            copyToClipboard(document.getElementById('embed-code').innerText);
        };

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        // --- CDN / Iframe Handler ---
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const isCdn = params.get('cdn');
            const id = params.get('id');
            const postView = params.get('post');

            // If it's a CDN request, we act as a script that injects an iframe
            if (isCdn && id) {
                const currentUrl = window.location.href.split('?')[0];
                const target = document.currentScript ? document.currentScript : document.getElementById(`tg-post-${id}`);
                const iframe = document.createElement('iframe');
                iframe.src = `${currentUrl}?post=${id}&embed=true`;
                iframe.style.width = "100%";
                iframe.style.height = "600px";
                iframe.style.border = "1px solid #eee";
                iframe.style.borderRadius = "10px";
                if(target.parentNode) target.parentNode.insertBefore(iframe, target);
                return;
            }

            if (postView || id) {
                router.navigate('read', postView || id);
                if(params.get('embed')) {
                    document.querySelector('nav').style.display = 'none';
                    document.body.style.background = 'transparent';
                }
            } else {
                router.navigate('home');
            }
        };

    </script>
</body>
</html>
