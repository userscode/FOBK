<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GApp - Поиск</title>
    <style>
        :root {
            --google-blue: #4285f4;
            --google-red: #ea4335;
            --google-yellow: #fbbc05;
            --google-green: #34a853;
            --gray-100: #f8f9fa;
            --gray-200: #e8eaed;
            --text-main: #202124;
            --text-light: #70757a;
            --shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            background-color: #fff;
        }

        /* Header / Auth Section */
        header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 30px;
            gap: 15px;
        }

        .btn {
            padding: 8px 24px;
            border-radius: 4px;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-primary {
            background-color: var(--google-blue);
            color: white;
        }

        .btn-primary:hover {
            background-color: #3b78e7;
            box-shadow: 0 1px 2px rgba(66, 133, 244, 0.3);
        }

        .btn-outline {
            background: white;
            border-color: var(--gray-200);
            color: var(--text-main);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #ccc;
        }

        /* Main Search Area */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .logo {
            font-size: 80px;
            font-weight: bold;
            margin-top: 60px;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }

        .logo span:nth-child(1) { color: var(--google-blue); }
        .logo span:nth-child(2) { color: var(--google-red); }
        .logo span:nth-child(3) { color: var(--google-yellow); }
        .logo span:nth-child(4) { color: var(--google-blue); }
        .logo span:nth-child(5) { color: var(--google-green); }
        .logo span:nth-child(6) { color: var(--google-red); }

        .search-box-container {
            position: relative;
            max-width: 584px;
            margin: 0 auto 30px;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            padding-left: 45px;
            font-size: 16px;
            border: 1px solid var(--gray-200);
            border-radius: 24px;
            outline: none;
            box-sizing: border-box;
        }

        .search-box:hover, .search-box:focus {
            box-shadow: var(--shadow);
            border-color: transparent;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9aa0a6;
        }

        /* Results Section */
        .results {
            text-align: left;
            margin-top: 40px;
            display: none;
        }

        .result-item {
            margin-bottom: 30px;
            max-width: 650px;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }

        .site-favicon {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }

        .site-favicon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .result-link-display {
            font-size: 14px;
            color: var(--text-main);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .result-title {
            font-size: 20px;
            color: #1a0dab;
            text-decoration: none;
            display: block;
            margin-bottom: 4px;
        }

        .result-title:hover {
            text-decoration: underline;
        }

        .result-snippet {
            font-size: 14px;
            color: #4d5156;
            line-height: 1.58;
        }

        /* Modal for adding site */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .modal h2 { margin-top: 0; }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--gray-200);
            border-radius: 4px;
            box-sizing: border-box;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .hidden { display: none !important; }

        #loading-indicator {
            margin: 20px 0;
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <header>
        <div id="auth-section">
            <button id="login-btn" class="btn btn-primary">Войти через Google</button>
        </div>
        <div id="user-section" class="user-info hidden">
            <button id="add-site-btn" class="btn btn-outline">Добавить сайт</button>
            <div class="user-details">
                <img id="user-photo" class="avatar" src="" alt="">
            </div>
            <button id="logout-btn" class="btn btn-outline">Выйти</button>
        </div>
    </header>

    <div class="container" id="main-ui">
        <div class="logo">
            <span>G</span><span>a</span><span>p</span><span>p</span><span>l</span><span>e</span>
        </div>

        <div class="search-box-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-box" placeholder="Поиск в GApp или введите URL">
        </div>

        <div id="loading-indicator" class="hidden">Поиск...</div>

        <div id="results-area" class="results">
            <!-- Results will be injected here -->
        </div>
    </div>

    <!-- Modal for adding site -->
    <div id="modal" class="modal-overlay">
        <div class="modal">
            <h2>Добавить свой сайт</h2>
            <div class="form-group">
                <label>Заголовок сайта</label>
                <input type="text" id="site-title" placeholder="Напр. Мой личный блог">
            </div>
            <div class="form-group">
                <label>URL ссылка</label>
                <input type="url" id="site-url" placeholder="https://example.com">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="site-desc" rows="3" placeholder="Краткое описание вашего ресурса"></textarea>
            </div>
            <div class="modal-actions">
                <button id="cancel-btn" class="btn btn-outline">Отмена</button>
                <button id="save-btn" class="btn btn-primary">Опубликовать</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration from user
        const firebaseConfig = {
            apiKey: "AIzaSyDb_xlpLYoVEkd1aObJjzvlS8-JPDjn72E",
            authDomain: "generalapp-b4f45.firebaseapp.com",
            databaseURL: "https://generalapp-b4f45-default-rtdb.firebaseio.com",
            projectId: "generalapp-b4f45",
            storageBucket: "generalapp-b4f45.firebasestorage.app",
            messagingSenderId: "800461808673",
            appId: "1:800461808673:web:ec6374f28c7a40ced7ef60",
            measurementId: "G-JYL0G1J1GJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gapp-search';

        // DOM Elements
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const authSection = document.getElementById('auth-section');
        const userSection = document.getElementById('user-section');
        const userPhoto = document.getElementById('user-photo');
        const addSiteBtn = document.getElementById('add-site-btn');
        const modal = document.getElementById('modal');
        const cancelBtn = document.getElementById('cancel-btn');
        const saveBtn = document.getElementById('save-btn');
        const searchInput = document.getElementById('search-input');
        const resultsArea = document.getElementById('results-area');
        const loadingIndicator = document.getElementById('loading-indicator');

        let currentUser = null;
        let allSites = [];

        // Auth Logic
        loginBtn.onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login failed", error);
            }
        };

        logoutBtn.onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authSection.classList.add('hidden');
                userSection.classList.remove('hidden');
                userPhoto.src = user.photoURL || '';
            } else {
                currentUser = null;
                authSection.classList.remove('hidden');
                userSection.classList.add('hidden');
            }
        });

        // Modal Logic
        addSiteBtn.onclick = () => modal.style.display = 'flex';
        cancelBtn.onclick = () => modal.style.display = 'none';

        saveBtn.onclick = async () => {
            const title = document.getElementById('site-title').value.trim();
            const url = document.getElementById('site-url').value.trim();
            const desc = document.getElementById('site-desc').value.trim();

            if (!title || !url || !desc) {
                alert("Пожалуйста, заполните все поля");
                return;
            }

            if (!currentUser) return;

            try {
                saveBtn.disabled = true;
                saveBtn.innerText = "Сохранение...";
                
                // Firestore path rule applied
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'sites');
                await addDoc(colRef, {
                    title,
                    url,
                    description: desc,
                    ownerId: currentUser.uid,
                    ownerName: currentUser.displayName,
                    createdAt: new Date().toISOString()
                });

                modal.style.display = 'none';
                document.getElementById('site-title').value = '';
                document.getElementById('site-url').value = '';
                document.getElementById('site-desc').value = '';
                
                await fetchSites(); // Refresh
            } catch (error) {
                console.error("Error saving site:", error);
                alert("Ошибка при сохранении");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "Опубликовать";
            }
        };

        // Search and Fetch Logic
        async function fetchSites() {
            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'sites');
                const q = query(colRef); // Rule 2: Simple query, filter in JS
                const snapshot = await getDocs(q);
                allSites = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch (e) {
                console.error("Fetch failed", e);
            }
        }

        function getFavicon(url) {
            try {
                const domain = new URL(url).hostname;
                return `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
            } catch (e) {
                return 'https://via.placeholder.com/32';
            }
        }

        function renderResults(queryStr) {
            resultsArea.innerHTML = '';
            const filtered = allSites.filter(site => 
                site.title.toLowerCase().includes(queryStr.toLowerCase()) || 
                site.description.toLowerCase().includes(queryStr.toLowerCase()) ||
                site.url.toLowerCase().includes(queryStr.toLowerCase())
            );

            if (queryStr.length === 0) {
                resultsArea.style.display = 'none';
                return;
            }

            resultsArea.style.display = 'block';

            if (filtered.length === 0) {
                resultsArea.innerHTML = `<p style="color:var(--text-light)">Ничего не найдено по запросу "${queryStr}"</p>`;
                return;
            }

            filtered.forEach(site => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <div class="result-header">
                        <div class="site-favicon">
                            <img src="${getFavicon(site.url)}" onerror="this.src='https://www.google.com/s2/favicons?sz=64&domain=google.com'">
                        </div>
                        <div class="result-link-display">${site.url}</div>
                    </div>
                    <a href="${site.url}" target="_blank" class="result-title">${site.title}</a>
                    <div class="result-snippet">${site.description}</div>
                `;
                resultsArea.appendChild(item);
            });
        }

        searchInput.oninput = (e) => {
            renderResults(e.target.value);
        };

        // Initial Load
        window.onload = async () => {
            await fetchSites();
        };

    </script>
</body>
</html>
