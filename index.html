<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GApp - Твои истории и посты</title>
    <!-- OpenGraph Tags (Dynamic placeholder) -->
    <meta property="og:title" content="GApp - Платформа для контента">
    <meta property="og:description" content="Создавай посты и истории в один клик">
    <meta property="og:type" content="website">

    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #2ecc71;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --accent: #3498db;
            --text: #333;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); color: var(--text); line-height: 1.6; }
        
        /* Layout */
        .header { background: var(--white); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); text-decoration: none; }
        .nav-btns button { margin-left: 10px; padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .btn-login { background: var(--primary); color: white; }
        .btn-outline { border: 1px solid var(--primary) !important; color: var(--primary); background: transparent; }
        
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        
        /* Dashboard & Editor */
        .card { background: var(--white); padding: 2rem; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 2rem; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        textarea { min-height: 200px; resize: vertical; }
        
        .btn-save { background: var(--primary); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
        
        /* Social Links inputs */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Story/Post Styles */
        .post-item { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .post-link { color: var(--accent); text-decoration: none; font-weight: bold; }
        
        /* Viewer Styles */
        .content-view { background: white; padding: 3rem; border-radius: 15px; }
        .content-view h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .banner-img { width: 100%; height: 300px; object-fit: cover; border-radius: 12px; margin-bottom: 2rem; }
        
        .yt-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin: 20px 0; border-radius: 12px; }
        .yt-container iframe { position: absolute; top:0; left: 0; width: 100%; height: 100%; }
        
        .external-link { display: inline-block; background: #f8f9fa; padding: 10px 20px; border: 1px solid #ddd; border-radius: 5px; color: var(--accent); text-decoration: none; margin: 10px 0; }
        
        .footer-socials { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 15px; }
        .social-icon { padding: 8px 15px; border-radius: 20px; background: #eee; text-decoration: none; color: #555; font-size: 0.9rem; }
        
        .donation-btn { display: block; text-align: center; background: #ff7300; color: white; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 2rem; }

        /* Hidden elements */
        .hidden { display: none !important; }
        
        /* Stories Banner */
        .banner-upload-preview { height: 150px; background: #f0f0f0; border: 2px dashed #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; overflow: hidden; }
        .banner-upload-preview img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header class="header">
        <a href="#" class="logo" onclick="showSection('home')">GApp</a>
        <div class="nav-btns">
            <span id="user-name" style="margin-right: 15px; font-weight: bold;"></span>
            <button id="btn-login" class="btn-login" onclick="login()">Войти через Google</button>
            <button id="btn-dashboard" class="btn-outline hidden" onclick="showSection('dashboard')">Мои посты</button>
            <button id="btn-create" class="btn-login hidden" onclick="showSection('editor')">Создать пост</button>
            <button id="btn-logout" class="btn-outline hidden" onclick="logout()">Выйти</button>
        </div>
    </header>

    <div class="container">
        <!-- Home Section -->
        <section id="section-home" class="section">
            <div class="card" style="text-align: center;">
                <h1>Добро пожаловать в GApp</h1>
                <p>Ваша персональная платформа для создания лонгридов и визуальных историй.</p>
                <br>
                <button class="btn-save" onclick="login()">Начать сейчас</button>
            </div>
        </section>

        <!-- Dashboard Section -->
        <section id="section-dashboard" class="section hidden">
            <h2>Мои публикации</h2>
            <div id="posts-list" style="margin-top: 1.5rem;">
                <!-- Posts will appear here -->
            </div>
        </section>

        <!-- Editor Section -->
        <section id="section-editor" class="section hidden">
            <div class="card">
                <h2>Создание публикации</h2>
                <br>
                <div class="input-group">
                    <label>Название поста</label>
                    <input type="text" id="post-title" placeholder="Заголовок...">
                </div>
                
                <div class="input-group">
                    <label>Баннер истории (URL фото)</label>
                    <input type="text" id="post-banner" placeholder="https://example.com/image.jpg" oninput="updatePreview(this.value)">
                    <div class="banner-upload-preview" id="preview-box">Превью баннера</div>
                </div>

                <div class="input-group">
                    <label>Текст поста (Markdown)</label>
                    <p style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">
                        Поддержка: [ytbe=ссылка] и [URL=ссылка]
                    </p>
                    <textarea id="post-content" placeholder="Начните писать здесь..."></textarea>
                </div>

                <h3>Социальные сети</h3>
                <div class="social-grid">
                    <input type="text" id="social-vk" placeholder="VK URL">
                    <input type="text" id="social-tg" placeholder="Telegram URL">
                    <input type="text" id="social-ok" placeholder="OK URL">
                    <input type="text" id="social-ds" placeholder="Discord URL">
                    <input type="text" id="social-yt" placeholder="YouTube URL">
                    <input type="text" id="social-gh" placeholder="GitHub URL">
                </div>
                <br>
                <div class="input-group">
                    <label>Ссылка на Donation Alerts</label>
                    <input type="text" id="social-donation" placeholder="https://www.donationalerts.com/r/username">
                </div>

                <button class="btn-save" onclick="savePost()">Опубликовать</button>
            </div>
        </section>

        <!-- Viewer Section -->
        <section id="section-viewer" class="section hidden">
            <div id="viewer-container" class="content-view">
                <!-- Content injected here -->
            </div>
        </section>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gapp-app';

        let currentUser = null;

        // --- Auth Functions ---
        async function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInWithPopup(provider);
                }
            } catch (error) {
                console.error("Auth error", error);
            }
        }

        function logout() {
            auth.signOut();
            showSection('home');
        }

        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('btn-dashboard').classList.remove('hidden');
                document.getElementById('btn-create').classList.remove('hidden');
                document.getElementById('btn-logout').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                loadUserPosts();
                if(window.location.hash.startsWith('#view/')) {
                    // Stay in viewer if direct link
                } else {
                    showSection('dashboard');
                }
            } else {
                document.getElementById('btn-login').classList.remove('hidden');
                document.getElementById('btn-dashboard').classList.add('hidden');
                document.getElementById('btn-create').classList.add('hidden');
                document.getElementById('btn-logout').classList.add('hidden');
                document.getElementById('user-name').innerText = '';
                checkDeepLink();
            }
        });

        // --- Navigation ---
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
        }

        function updatePreview(url) {
            const box = document.getElementById('preview-box');
            if(url) {
                box.innerHTML = `<img src="${url}" onerror="this.src='https://via.placeholder.com/800x300?text=Error+Loading+Image'">`;
            } else {
                box.innerHTML = 'Превью баннера';
            }
        }

        // --- Post Logic ---
        async function savePost() {
            if (!currentUser) return;

            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            const banner = document.getElementById('post-banner').value;
            const socials = {
                vk: document.getElementById('social-vk').value,
                tg: document.getElementById('social-tg').value,
                ok: document.getElementById('social-ok').value,
                ds: document.getElementById('social-ds').value,
                yt: document.getElementById('social-yt').value,
                gh: document.getElementById('social-gh').value,
                donation: document.getElementById('social-donation').value
            };

            if(!title || !content) {
                alert("Заполните заголовок и содержание!");
                return;
            }

            try {
                const postRef = await db.collection('artifacts', appId, 'public', 'data', 'posts').add({
                    uid: currentUser.uid,
                    author: currentUser.displayName,
                    title,
                    content,
                    banner,
                    socials,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Пост опубликован!");
                showSection('dashboard');
                loadUserPosts();
            } catch (e) {
                console.error("Save error", e);
            }
        }

        async function loadUserPosts() {
            if (!currentUser) return;
            const container = document.getElementById('posts-list');
            container.innerHTML = 'Загрузка...';

            // Note: In real app we'd use .where('uid', '==', currentUser.uid)
            // But per Rule 2, we fetch all and filter in memory
            const snapshot = await db.collection('artifacts', appId, 'public', 'data', 'posts').get();
            container.innerHTML = '';
            
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                if (data.uid === currentUser.uid) {
                    const item = document.createElement('div');
                    item.className = 'post-item';
                    const link = `${window.location.origin}${window.location.pathname}#view/${doc.id}`;
                    item.innerHTML = `
                        <div>
                            <strong>${data.title}</strong><br>
                            <small>${link}</small>
                        </div>
                        <button class="btn-outline" onclick="viewPost('${doc.id}')">Открыть</button>
                    `;
                    container.appendChild(item);
                }
            });
        }

        // --- Renderer ---
        function parseContent(text) {
            // Basic HTML escape
            let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            // New lines
            html = html.replace(/\n/g, '<br>');

            // [ytbe=https://...]
            html = html.replace(/\[ytbe=(.*?)\]/g, (match, url) => {
                const vid = url.split('v=')[1] || url.split('/').pop();
                return `<div class="yt-container"><iframe src="https://www.youtube.com/embed/${vid}" frameborder="0" allowfullscreen></iframe></div>`;
            });

            // [URL=...]
            html = html.replace(/\[URL=(.*?)\]/g, (match, url) => {
                return `<a href="${url}" class="external-link" target="_blank">Перейти по ссылке: ${url}</a>`;
            });

            return html;
        }

        async function viewPost(id) {
            window.location.hash = `view/${id}`;
            const doc = await db.collection('artifacts', appId, 'public', 'data', 'posts').doc(id).get();
            if (!doc.exists) {
                alert("Пост не найден");
                return;
            }

            const data = doc.data();
            const container = document.getElementById('viewer-container');
            
            let socialsHtml = '';
            const labels = {vk:'VK', tg:'Telegram', ok:'OK', ds:'Discord', yt:'YouTube', gh:'GitHub'};
            for (let key in labels) {
                if (data.socials[key]) {
                    socialsHtml += `<a href="${data.socials[key]}" class="social-icon" target="_blank">${labels[key]}</a>`;
                }
            }

            container.innerHTML = `
                ${data.banner ? `<img src="${data.banner}" class="banner-img">` : ''}
                <h1>${data.title}</h1>
                <p style="color: #888; margin-bottom: 2rem;">Автор: ${data.author}</p>
                <div class="main-body">${parseContent(data.content)}</div>
                
                <div class="footer-socials">
                    ${socialsHtml}
                </div>

                ${data.socials.donation ? `
                    <a href="${data.socials.donation}" class="donation-btn" target="_blank">Поддержать автора (Donation Alerts)</a>
                ` : ''}
            `;

            showSection('viewer');
        }

        function checkDeepLink() {
            const hash = window.location.hash;
            if (hash.startsWith('#view/')) {
                const id = hash.split('/')[1];
                viewPost(id);
            }
        }

        window.addEventListener('hashchange', checkDeepLink);
        window.onload = checkDeepLink;

    </script>
</body>
</html>
