<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GApp - Твой Интернет</title>
    <style>
        :root {
            --accent-color: #00f2ff;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-color);
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Навигация */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .brand {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .auth-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
        }

        .btn-glow {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.5);
        }

        .btn-glass {
            background: var(--glass-bg);
            color: #fff;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Главная секция */
        .hero {
            text-align: center;
            padding: 100px 20px 40px;
        }

        .hero h1 {
            font-size: clamp(40px, 8vw, 80px);
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 20px 30px;
            padding-left: 60px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: #fff;
            font-size: 18px;
            outline: none;
            backdrop-filter: blur(15px);
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .search-icon-float {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0.5;
        }

        /* Результаты */
        .results-grid {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            gap: 20px;
        }

        .site-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .site-card:hover {
            transform: scale(1.02);
            border-color: rgba(0, 242, 255, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #fff;
            padding: 5px;
            flex-shrink: 0;
        }

        .card-info h3 {
            margin: 0;
            color: #fff;
            font-size: 20px;
        }

        .card-info span {
            font-size: 13px;
            color: var(--accent-color);
            opacity: 0.8;
        }

        .card-desc {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .card-link {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* Модалка */
        .modal-wrap {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--glass-border);
            text-align: left;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            background: #0f0f1f;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            outline: none;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
        }

        .hidden { display: none !important; }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
        }

        /* Анимация загрузки */
        .loader {
            width: 30px;
            height: 30px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">GAPP</div>
        <div class="auth-controls">
            <div id="logged-out-ui">
                <button id="login-btn" class="btn btn-glow">Войти</button>
            </div>
            <div id="logged-in-ui" class="hidden">
                <button id="add-site-trigger" class="btn btn-glass">+ Добавить</button>
                <img id="user-avatar" class="avatar" src="" alt="user">
                <button id="logout-btn" class="btn btn-glass">Выход</button>
            </div>
        </div>
    </header>

    <main class="hero">
        <h1>Твой Интернет</h1>
        <div class="search-container">
            <span class="search-icon-float">🔭</span>
            <input type="text" id="main-search" class="search-input" placeholder="Название или URL сайта...">
        </div>

        <div id="loader" class="loader hidden"></div>

        <div id="results" class="results-grid">
            <!-- Сайты будут тут -->
        </div>
    </main>

    <!-- Modal -->
    <div id="site-modal" class="modal-wrap">
        <div class="modal-content">
            <h2 style="margin-top: 0;">Новый ресурс</h2>
            <div class="input-group">
                <label>Название проекта</label>
                <input type="text" id="f-title" placeholder="Крутой Сайт">
            </div>
            <div class="input-group">
                <label>Ссылка (URL)</label>
                <input type="url" id="f-url" placeholder="https://example.com">
            </div>
            <div class="input-group">
                <label>Что это такое?</label>
                <textarea id="f-desc" rows="3" placeholder="Краткое описание..."></textarea>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button id="close-modal" class="btn btn-glass">Отмена</button>
                <button id="confirm-save" class="btn btn-glow">Опубликовать</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDb_xlpLYoVEkd1aObJjzvlS8-JPDjn72E",
            authDomain: "generalapp-b4f45.firebaseapp.com",
            databaseURL: "https://generalapp-b4f45-default-rtdb.firebaseio.com",
            projectId: "generalapp-b4f45",
            storageBucket: "generalapp-b4f45.firebasestorage.app",
            messagingSenderId: "800461808673",
            appId: "1:800461808673:web:ec6374f28c7a40ced7ef60"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gapp-custom';

        let user = null;
        let sitesList = [];

        // UI Elements
        const resultsEl = document.getElementById('results');
        const searchInput = document.getElementById('main-search');
        const loader = document.getElementById('loader');

        // Auth
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                document.getElementById('logged-out-ui').classList.add('hidden');
                document.getElementById('logged-in-ui').classList.remove('hidden');
                document.getElementById('user-avatar').src = user.photoURL;
            } else {
                document.getElementById('logged-out-ui').classList.remove('hidden');
                document.getElementById('logged-in-ui').classList.add('hidden');
            }
        });

        // Modal Controls
        const modal = document.getElementById('site-modal');
        document.getElementById('add-site-trigger').onclick = () => modal.style.display = 'flex';
        document.getElementById('close-modal').onclick = () => modal.style.display = 'none';

        // Load Data
        async function loadSites() {
            loader.classList.remove('hidden');
            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'sites');
                const snap = await getDocs(colRef);
                sitesList = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                render(searchInput.value);
            } finally {
                loader.classList.add('hidden');
            }
        }

        // Search logic (No verification needed for searching)
        function render(queryStr = "") {
            resultsEl.innerHTML = "";
            const term = queryStr.toLowerCase().trim();
            
            // Фильтр по названию ИЛИ по ссылке
            const filtered = sitesList.filter(s => 
                s.title.toLowerCase().includes(term) || 
                s.url.toLowerCase().includes(term)
            );

            if (filtered.length === 0) {
                resultsEl.innerHTML = `<div style="text-align:center; opacity:0.5; grid-column: 1/-1;">Ничего не найдено</div>`;
                return;
            }

            filtered.forEach(site => {
                const domain = new URL(site.url).hostname;
                const favicon = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
                
                const card = document.createElement('div');
                card.className = 'site-card';
                card.innerHTML = `
                    <a href="${site.url}" target="_blank" class="card-link"></a>
                    <div class="card-header">
                        <img class="card-icon" src="${favicon}" onerror="this.src='https://via.placeholder.com/40?text=?'">
                        <div class="card-info">
                            <h3>${site.title}</h3>
                            <span>${domain}</span>
                        </div>
                    </div>
                    <div class="card-desc">${site.description}</div>
                `;
                resultsEl.appendChild(card);
            });
        }

        // Save Logic
        document.getElementById('confirm-save').onclick = async () => {
            if (!user) return;
            
            const title = document.getElementById('f-title').value.trim();
            const url = document.getElementById('f-url').value.trim();
            const description = document.getElementById('f-desc').value.trim();

            if (!title || !url || !description) {
                alert("Заполни все поля!");
                return;
            }

            // ПРОВЕРКА НА ДУБЛИКАТ
            const exists = sitesList.some(s => s.url.toLowerCase() === url.toLowerCase());
            if (exists) {
                alert("Этот сайт уже есть в нашей базе!");
                return;
            }

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'sites');
                await addDoc(colRef, {
                    title, url, description,
                    uid: user.uid,
                    ts: Date.now()
                });
                modal.style.display = 'none';
                await loadSites();
            } catch (e) {
                alert("Ошибка сохранения");
            }
        };

        searchInput.oninput = (e) => render(e.target.value);

        // Bootstrap
        loadSites();

    </script>
</body>
</html>
