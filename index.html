<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Gmail Inbox</title>
    <style>
        :root {
            --primary-color: #c04b37;
            --bg-color: #f6f8fc;
            --sidebar-width: 260px;
            --border-color: #dadce0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: #202124;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: #fff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin-bottom: 20px;
            background: #f1f3f4;
            border-radius: 12px;
            font-size: 13px;
        }

        .user-profile img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .btn-google {
            background: #fff;
            color: #3c4043;
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add {
            background-color: #c2e7ff;
            color: #001d35;
            border: none;
            padding: 15px 20px;
            border-radius: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 10px;
            transition: box-shadow 0.2s;
        }

        .btn-add:hover {
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.30), 0 4px 8px 3px rgba(60,64,67,0.15);
        }

        .account-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
        }

        .account-item {
            padding: 10px;
            border-radius: 20px;
            margin-bottom: 5px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .account-item:hover { background-color: #f1f3f4; }
        .account-item.active { background-color: #e8f0fe; color: #1967d2; font-weight: bold; }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            margin: 8px;
            border-radius: 16px;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }

        .header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-bar {
            background: #f1f3f4;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            width: 60%;
            max-width: 600px;
        }

        .inbox-list {
            flex: 1;
            overflow-y: auto;
        }

        .email-item {
            display: grid;
            grid-template-columns: 200px 1fr 100px;
            padding: 10px 20px;
            border-bottom: 1px solid #f1f3f4;
            cursor: pointer;
            align-items: center;
            font-size: 14px;
        }

        .email-item:hover {
            box-shadow: inset 1px 0 0 #dadce0, inset -1px 0 0 #dadce0, 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
            z-index: 1;
        }

        .email-sender { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .email-subject { color: #5f6368; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .email-account-tag { font-size: 10px; background: #e8eaed; padding: 2px 6px; border-radius: 4px; margin-right: 10px; color: #3c4043; }
        .email-date { text-align: right; color: #5f6368; }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: white; padding: 25px; border-radius: 8px; width: 400px;
        }

        .modal input, .modal textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        
        .btn { padding: 8px 16px; border-radius: 4px; cursor: pointer; border: none; font-weight: 500; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: #e8eaed; color: #3c4043; }

        #loading {
            position: fixed; top: 20px; right: 20px;
            background: #323232; color: white; padding: 10px 20px; border-radius: 4px;
            display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loading">Загрузка...</div>

    <aside class="sidebar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5l-8-5V6l8 5l8-5v2z"/></svg>
            Multi-Gmail
        </div>

        <div id="authSection">
            <!-- Кнопка входа или профиль -->
            <button class="btn-google" id="loginBtn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Войти через Google
            </button>
        </div>

        <div id="appControls" style="display: none;">
            <button class="btn-add" onclick="showModal('accountModal')">＋ Добавить аккаунт</button>
            <button class="btn-add" style="background:#fce8e6" onclick="showModal('emailModal')">✉ Написать письмо</button>
            
            <div style="font-weight: bold; margin: 15px 0 10px; font-size: 11px; color: #5f6368; text-transform: uppercase;">Аккаунты</div>
            <ul class="account-list" id="accountList"></ul>
            <button class="btn" style="margin-top: auto; font-size: 12px; color: #c04b37;" id="logoutBtn">Выйти</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <input type="text" class="search-bar" placeholder="Поиск в почте">
            <div id="statusInfo">Войдите, чтобы увидеть сообщения</div>
        </header>
        <div class="inbox-list" id="emailList"></div>
    </main>

    <!-- Modals -->
    <div class="modal-overlay" id="accountModal">
        <div class="modal">
            <h2>Добавить новый аккаунт</h2>
            <input type="email" id="newAccountEmail" placeholder="example@gmail.com">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideModal('accountModal')">Отмена</button>
                <button class="btn btn-primary" onclick="addAccount()">Добавить</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="emailModal">
        <div class="modal">
            <h2>Симуляция входящего письма</h2>
            <select id="selectAccount" style="width: 100%; padding: 10px; margin-bottom: 10px;"></select>
            <input type="text" id="emailSender" placeholder="От кого">
            <input type="text" id="emailSubject" placeholder="Тема">
            <textarea id="emailBody" rows="4" placeholder="Текст письма"></textarea>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideModal('emailModal')">Отмена</button>
                <button class="btn btn-primary" onclick="sendEmail()">Получить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDb_xlpLYoVEkd1aObJjzvlS8-JPDjn72E",
            authDomain: "generalapp-b4f45.firebaseapp.com",
            databaseURL: "https://generalapp-b4f45-default-rtdb.firebaseio.com",
            projectId: "generalapp-b4f45",
            storageBucket: "generalapp-b4f45.firebasestorage.app",
            messagingSenderId: "800461808673",
            appId: "1:800461808673:web:ec6374f28c7a40ced7ef60",
            measurementId: "G-JYL0G1J1GJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = "multi-gmail-app";

        let currentUser = null;
        let accounts = [];
        let emails = [];
        let unsubscribes = [];

        // Auth Logic
        document.getElementById('loginBtn').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Auth error:", error);
            }
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const authSection = document.getElementById('authSection');
            const appControls = document.getElementById('appControls');
            
            unsubscribes.forEach(unsub => unsub());
            unsubscribes = [];

            if (user) {
                authSection.innerHTML = `
                    <div class="user-profile">
                        <img src="${user.photoURL || 'https://via.placeholder.com/32'}" alt="Avatar">
                        <div style="overflow: hidden; text-overflow: ellipsis;">
                            <b>${user.displayName}</b><br>
                            <small>${user.email}</small>
                        </div>
                    </div>
                `;
                appControls.style.display = 'flex';
                appControls.style.flexDirection = 'column';
                setupSubscriptions();
            } else {
                authSection.innerHTML = `
                    <button class="btn-google" id="loginBtn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                        Войти через Google
                    </button>
                `;
                document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
                appControls.style.display = 'none';
                document.getElementById('emailList').innerHTML = '<div style="padding: 40px; text-align: center;">Пожалуйста, войдите в аккаунт</div>';
                document.getElementById('statusInfo').innerText = 'Войдите, чтобы продолжить';
                document.getElementById('accountList').innerHTML = '';
            }
        });

        function setupSubscriptions() {
            if (!currentUser) return;
            showLoading(true);

            const accPath = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'accounts');
            const emailPath = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'emails');

            const unsubAcc = onSnapshot(accPath, (snap) => {
                accounts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderAccounts();
                updateAccountSelect();
                showLoading(false);
            });

            const unsubEmail = onSnapshot(emailPath, (snap) => {
                emails = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                emails.sort((a, b) => b.timestamp - a.timestamp);
                renderEmails();
            });

            unsubscribes.push(unsubAcc, unsubEmail);
        }

        // --- Logic Functions ---

        window.addAccount = async () => {
            const email = document.getElementById('newAccountEmail').value.trim();
            if (!email || !currentUser) return;
            await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'accounts'), {
                email, createdAt: Date.now()
            });
            hideModal('accountModal');
            document.getElementById('newAccountEmail').value = '';
        };

        window.sendEmail = async () => {
            const to = document.getElementById('selectAccount').value;
            const from = document.getElementById('emailSender').value.trim();
            const sub = document.getElementById('emailSubject').value.trim();
            const body = document.getElementById('emailBody').value.trim();
            if (!to || !from || !currentUser) return;
            await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'emails'), {
                toAccount: to, sender: from, subject: sub, body: body, timestamp: Date.now()
            });
            hideModal('emailModal');
        };

        function renderAccounts() {
            const list = document.getElementById('accountList');
            list.innerHTML = `<li class="account-item active" onclick="filterEmails('all')"><span>Все ящики</span><span>${emails.length}</span></li>`;
            accounts.forEach(acc => {
                const count = emails.filter(e => e.toAccount === acc.email).length;
                const li = document.createElement('li');
                li.className = 'account-item';
                li.innerHTML = `<span>${acc.email.split('@')[0]}</span><span>${count}</span>`;
                li.onclick = (e) => {
                    document.querySelectorAll('.account-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    renderEmails(acc.email);
                };
                list.appendChild(li);
            });
        }

        function renderEmails(filter = 'all') {
            const list = document.getElementById('emailList');
            const filtered = filter === 'all' ? emails : emails.filter(e => e.toAccount === filter);
            document.getElementById('statusInfo').innerText = `Сообщений: ${filtered.length}`;
            list.innerHTML = filtered.length ? '' : '<div style="padding:40px; text-align:center; color:#5f6368;">Пусто</div>';
            filtered.forEach(m => {
                const div = document.createElement('div');
                div.className = 'email-item';
                div.innerHTML = `
                    <div class="email-sender">${m.sender}</div>
                    <div class="email-subject"><span class="email-account-tag">${m.toAccount}</span>${m.subject}</div>
                    <div class="email-date">${new Date(m.timestamp).toLocaleDateString()}</div>
                `;
                list.appendChild(div);
            });
        }

        function updateAccountSelect() {
            const sel = document.getElementById('selectAccount');
            sel.innerHTML = accounts.map(a => `<option value="${a.email}">${a.email}</option>`).join('');
        }

        window.showModal = (id) => document.getElementById(id).style.display = 'flex';
        window.hideModal = (id) => document.getElementById(id).style.display = 'none';
        function showLoading(s) { document.getElementById('loading').style.display = s ? 'block' : 'none'; }

    </script>
</body>
</html>
