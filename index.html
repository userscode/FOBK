<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Gmail Inbox</title>
    <style>
        :root {
            --primary-color: #c04b37;
            --bg-color: #f6f8fc;
            --sidebar-width: 260px;
            --border-color: #dadce0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: #202124;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: #fff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-add {
            background-color: #c2e7ff;
            color: #001d35;
            border: none;
            padding: 15px 20px;
            border-radius: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 20px;
            transition: box-shadow 0.2s;
        }

        .btn-add:hover {
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.30), 0 4px 8px 3px rgba(60,64,67,0.15);
        }

        .account-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .account-item {
            padding: 10px;
            border-radius: 20px;
            margin-bottom: 5px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .account-item:hover {
            background-color: #f1f3f4;
        }

        .account-item.active {
            background-color: #e8f0fe;
            color: #1967d2;
            font-weight: bold;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            margin: 8px;
            border-radius: 16px;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }

        .header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-bar {
            background: #f1f3f4;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            width: 60%;
            max-width: 600px;
        }

        .inbox-list {
            flex: 1;
            overflow-y: auto;
        }

        .email-item {
            display: grid;
            grid-template-columns: 200px 1fr 100px;
            padding: 10px 20px;
            border-bottom: 1px solid #f1f3f4;
            cursor: pointer;
            align-items: center;
            font-size: 14px;
        }

        .email-item:hover {
            box-shadow: inset 1px 0 0 #dadce0, inset -1px 0 0 #dadce0, 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
            z-index: 1;
        }

        .email-sender {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-subject {
            color: #5f6368;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-account-tag {
            font-size: 10px;
            background: #e8eaed;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 10px;
            color: #3c4043;
        }

        .email-date {
            text-align: right;
            color: #5f6368;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .modal h2 { margin-top: 0; font-size: 18px; }
        .modal input, .modal textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-weight: 500;
        }

        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: #e8eaed; color: #3c4043; }

        #loading {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #323232;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="loading">Загрузка...</div>

    <aside class="sidebar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5l-8-5V6l8 5l8-5v2z"/></svg>
            Multi-Gmail
        </div>
        <button class="btn-add" onclick="showModal('accountModal')">＋ Добавить аккаунт</button>
        <button class="btn-add" style="background:#fce8e6" onclick="showModal('emailModal')">✉ Написать письмо</button>
        
        <div style="font-weight: bold; margin-bottom: 10px; font-size: 12px; color: #5f6368; text-transform: uppercase;">Аккаунты</div>
        <ul class="account-list" id="accountList">
            <!-- Аккаунты будут здесь -->
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <input type="text" class="search-bar" placeholder="Поиск в почте">
            <div id="statusInfo">Всего сообщений: 0</div>
        </header>

        <div class="inbox-list" id="emailList">
            <!-- Письма будут здесь -->
        </div>
    </main>

    <!-- Modal for Adding Account -->
    <div class="modal-overlay" id="accountModal">
        <div class="modal">
            <h2>Добавить новый аккаунт</h2>
            <input type="email" id="newAccountEmail" placeholder="example@gmail.com">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideModal('accountModal')">Отмена</button>
                <button class="btn btn-primary" onclick="addAccount()">Добавить</button>
            </div>
        </div>
    </div>

    <!-- Modal for Sending Email (Simulation) -->
    <div class="modal-overlay" id="emailModal">
        <div class="modal">
            <h2>Симуляция входящего письма</h2>
            <select id="selectAccount" style="width: 100%; padding: 10px; margin-bottom: 10px;"></select>
            <input type="text" id="emailSender" placeholder="От кого">
            <input type="text" id="emailSubject" placeholder="Тема">
            <textarea id="emailBody" rows="4" placeholder="Текст письма"></textarea>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideModal('emailModal')">Отмена</button>
                <button class="btn btn-primary" onclick="sendEmail()">Получить</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDb_xlpLYoVEkd1aObJjzvlS8-JPDjn72E",
            authDomain: "generalapp-b4f45.firebaseapp.com",
            databaseURL: "https://generalapp-b4f45-default-rtdb.firebaseio.com",
            projectId: "generalapp-b4f45",
            storageBucket: "generalapp-b4f45.firebasestorage.app",
            messagingSenderId: "800461808673",
            appId: "1:800461808673:web:ec6374f28c7a40ced7ef60",
            measurementId: "G-JYL0G1J1GJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "multi-gmail-app";

        let currentUser = null;
        let accounts = [];
        let emails = [];

        // Auth initialization
        const initAuth = async () => {
            showLoading(true);
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth error:", error);
                showMessage("Ошибка авторизации");
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                setupSubscriptions();
            }
            showLoading(false);
        });

        // Setup Firestore Subscriptions
        function setupSubscriptions() {
            const accountsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'accounts');
            const emailsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'emails');

            // Listen for accounts
            onSnapshot(accountsRef, (snapshot) => {
                accounts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAccounts();
                updateAccountSelect();
            }, (err) => console.error("Accounts list error:", err));

            // Listen for emails
            onSnapshot(emailsRef, (snapshot) => {
                emails = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // Sort by date in memory (Rule 2: avoid complex query if possible)
                emails.sort((a, b) => b.timestamp - a.timestamp);
                renderEmails();
            }, (err) => console.error("Email list error:", err));
        }

        // --- Functions ---

        window.addAccount = async () => {
            const emailInput = document.getElementById('newAccountEmail');
            const email = emailInput.value.trim();
            if (!email || !currentUser) return;

            showLoading(true);
            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'accounts'), {
                    email: email,
                    createdAt: Date.now()
                });
                emailInput.value = '';
                hideModal('accountModal');
            } catch (e) {
                console.error(e);
            }
            showLoading(false);
        };

        window.sendEmail = async () => {
            const targetAccount = document.getElementById('selectAccount').value;
            const sender = document.getElementById('emailSender').value.trim();
            const subject = document.getElementById('emailSubject').value.trim();
            const body = document.getElementById('emailBody').value.trim();

            if (!targetAccount || !sender || !currentUser) return;

            showLoading(true);
            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'emails'), {
                    toAccount: targetAccount,
                    sender: sender,
                    subject: subject,
                    body: body,
                    timestamp: Date.now()
                });
                hideModal('emailModal');
            } catch (e) {
                console.error(e);
            }
            showLoading(false);
        };

        function renderAccounts() {
            const list = document.getElementById('accountList');
            list.innerHTML = `
                <li class="account-item active" onclick="filterEmails('all')">
                    <span>Все ящики</span>
                    <span style="font-size:10px">${emails.length}</span>
                </li>
            `;
            
            accounts.forEach(acc => {
                const count = emails.filter(e => e.toAccount === acc.email).length;
                const li = document.createElement('li');
                li.className = 'account-item';
                li.innerHTML = `
                    <span title="${acc.email}">${acc.email.split('@')[0]}</span>
                    <span style="font-size:10px">${count}</span>
                `;
                li.onclick = () => filterEmails(acc.email);
                list.appendChild(li);
            });
        }

        function renderEmails(filter = 'all') {
            const list = document.getElementById('emailList');
            list.innerHTML = '';
            
            const filtered = filter === 'all' 
                ? emails 
                : emails.filter(e => e.toAccount === filter);

            document.getElementById('statusInfo').innerText = `Сообщений: ${filtered.length}`;

            if (filtered.length === 0) {
                list.innerHTML = '<div style="padding: 40px; text-align: center; color: #5f6368;">Входящих сообщений пока нет</div>';
                return;
            }

            filtered.forEach(mail => {
                const date = new Date(mail.timestamp).toLocaleDateString([], { month: 'short', day: 'numeric' });
                const item = document.createElement('div');
                item.className = 'email-item';
                item.innerHTML = `
                    <div class="email-sender">${mail.sender}</div>
                    <div class="email-subject">
                        <span class="email-account-tag">${mail.toAccount}</span>
                        ${mail.subject} - <span style="font-weight: normal; color: #80868b">${mail.body.substring(0, 50)}...</span>
                    </div>
                    <div class="email-date">${date}</div>
                `;
                list.appendChild(item);
            });
        }

        window.filterEmails = (account) => {
            renderEmails(account);
            // Visual active state
            const items = document.querySelectorAll('.account-item');
            items.forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        function updateAccountSelect() {
            const select = document.getElementById('selectAccount');
            select.innerHTML = accounts.map(acc => `<option value="${acc.email}">${acc.email}</option>`).join('');
            if (accounts.length === 0) {
                select.innerHTML = '<option disabled>Сначала добавьте аккаунт</option>';
            }
        }

        // UI Helpers
        window.showModal = (id) => document.getElementById(id).style.display = 'flex';
        window.hideModal = (id) => document.getElementById(id).style.display = 'none';
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showMessage(msg) {
            const status = document.getElementById('statusInfo');
            status.innerText = msg;
            setTimeout(() => status.innerText = `Всего сообщений: ${emails.length}`, 3000);
        }

        initAuth();

    </script>
</body>
</html>
