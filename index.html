<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate System & Network Stress Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', sans-serif;
            color: #00ff00;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.95);
            padding: 20px;
            border: 2px solid #ff00ea;
            pointer-events: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255, 0, 234, 0.4);
        }

        .stat-line {
            margin-bottom: 8px;
            font-size: 16px;
            text-shadow: 1px 1px 2px #000;
        }

        .stat-value {
            font-weight: bold;
            color: #fff;
            font-family: monospace;
        }

        #timer-msg {
            color: #00eaff;
            font-size: 14px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        #next-boom {
            font-size: 28px;
            color: #ff00ea;
            display: block;
            margin-top: 5px;
        }

        #network-status {
            color: #ff3300;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="stat-line">FPS: <span id="fps-counter" class="stat-value">--</span></div>
        <div class="stat-line">3D Объекты: <span id="obj-count" class="stat-value">64,000</span></div>
        <div class="stat-line">Сетевой трафик: <span id="net-load" class="stat-value">MAX</span></div>
        <div id="network-status">HTTP Requests: ACTIVE</div>
        <div id="timer-msg">УМНОЖЕНИЕ x4 ЧЕРЕЗ: <span id="next-boom">10</span></div>
    </div>

    <script>
        let scene, camera, renderer;
        let objects = [];
        let memoryHolders = [];
        let lastTime = performance.now();
        let frames = 0;
        let secondsToNextBoom = 10;

        const textureLoader = new THREE.TextureLoader();
        const texPaths = ['fone.gif', 'exp.gif'];

        const objDisplay = document.getElementById('obj-count');
        const fpsDisplay = document.getElementById('fps-counter');
        const timerDisplay = document.getElementById('next-boom');

        // 1. Нагрузка на интернет и сеть (HTTP Requests Stress)
        function startNetworkStress() {
            // Бесконечные запросы к случайным ресурсам (используем кэш-брейкеры)
            setInterval(() => {
                for(let i = 0; i < 10; i++) {
                    // Запрашиваем крупные библиотеки или саму страницу многократно
                    fetch(`/?cache_bust=${Math.random()}`, { mode: 'no-cors' })
                        .catch(() => {}); // Игнорируем ошибки, важен сам факт запроса
                }
            }, 50);
        }

        // 2. Нагрузка на CPU (Web Workers)
        function startCPUStress() {
            const workerCode = `
                setInterval(() => {
                    let x = 0;
                    for(let i = 0; i < 8000000; i++) {
                        x += Math.sin(Math.random()) * Math.cos(Math.random());
                    }
                }, 0);
            `;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const workerURL = URL.createObjectURL(blob);
            for(let i = 0; i < (navigator.hardwareConcurrency || 8); i++) {
                new Worker(workerURL);
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.z = 500;

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(1);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.PointLight(0xffffff, 1.5, 2000);
            light.position.set(100, 100, 100);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x222222));

            startCPUStress();
            startNetworkStress();
            addObjects(64000);

            // Таймер X4
            setInterval(() => {
                secondsToNextBoom--;
                if (secondsToNextBoom <= 0) {
                    const currentCount = objects.length;
                    // Предохранитель, чтобы не вылетело слишком быстро на 1 млн объектов
                    if (currentCount < 500000) {
                        addObjects(currentCount * 3);
                    }
                    secondsToNextBoom = 10;
                }
                timerDisplay.textContent = secondsToNextBoom;
            }, 1000);
        }

        function addObjects(countToAdd) {
            const geometry = new THREE.BoxGeometry(2, 2, 2);

            for (let i = 0; i < countToAdd; i++) {
                const randomTex = texPaths[Math.floor(Math.random() * texPaths.length)];

                const material = new THREE.MeshPhongMaterial({
                    map: textureLoader.load(randomTex, undefined, undefined, () => {}),
                    color: new THREE.Color(Math.random(), Math.random(), Math.random()),
                    shininess: 100
                });

                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(
                    (Math.random() - 0.5) * 1200,
                    (Math.random() - 0.5) * 1200,
                    (Math.random() - 0.5) * 1200
                );

                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);

                // Нагрузка на RAM через TypedArrays
                try {
                    mesh.userData.ramBlock = new Float32Array(1024);
                    if (i % 50 === 0) memoryHolders.push(new Uint32Array(1024 * 100));
                } catch(e) {}

                scene.add(mesh);
                objects.push(mesh);
            }
            objDisplay.textContent = objects.length.toLocaleString();
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now() * 0.001;

            // Тяжелый цикл обновления 3D
            for (let i = 0; i < objects.length; i++) {
                const obj = objects[i];
                obj.rotation.x += 0.03;
                obj.position.y += Math.sin(time + i) * 0.05;
            }

            renderer.render(scene, camera);

            frames++;
            const currentTime = performance.now();
            if (currentTime >= lastTime + 1000) {
                fpsDisplay.textContent = frames;
                frames = 0;
                lastTime = currentTime;
            }
        }

        window.onload = () => {
            init();
            animate();
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
